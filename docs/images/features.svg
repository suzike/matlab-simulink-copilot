<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1626"/><stop offset="1" stop-color="#16121f"/></linearGradient>
  </defs>
  <rect width="920" height="560" rx="14" fill="url(#bg4)"/>
  <text x="36" y="44" fill="#f3f0fa" font-size="20" font-weight="700">v0.10.3 功能全景</text>
  <text x="36" y="66" fill="#9a92ad" font-size="12.5">原生内嵌 AI 助手 + 确定性 MBD 工程套件 + 多会话可靠性与统一安全门控。</text>

  <!-- col 1: 对标官方 -->
  <rect x="36" y="86" width="280" height="446" rx="12" fill="#231b38" stroke="#7c3aed"/>
  <text x="56" y="114" fill="#e9d5ff" font-size="14" font-weight="700">对标官方 Copilot</text>
  <g font-size="11.5" fill="#d7cef0">
    <text x="56" y="146">💬 对话（工具/建模/设计建议）</text>
    <text x="56" y="176">🧩 解释模型 / 模块（读真实参数）</text>
    <text x="56" y="206">🔍 搜索组件 → 画布高亮</text>
    <text x="56" y="236">🩺 结构化诊断 + 一键跳转 block</text>
    <text x="56" y="266">📖 答案锚定 MathWorks 文档（RAG）</text>
    <text x="56" y="296">🛡 可信度 / 可追溯（认证级审计）</text>
    <text x="56" y="326">⚙ 自适应任务流（对标 Process Advisor）</text>
    <text x="56" y="356">↳ 生成到光标（替代灰字补全）</text>
  </g>
  <rect x="56" y="378" width="240" height="60" rx="8" fill="#14361f" stroke="#2f7d4f"/>
  <text x="176" y="402" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">✓ 4 个红框差距全部闭合</text>
  <text x="176" y="422" fill="#7fbf95" font-size="10.5" text-anchor="middle">在中国可用 · R2025b 可用</text>

  <!-- col 2: MBD 工程化 -->
  <rect x="328" y="86" width="280" height="446" rx="12" fill="#241d35" stroke="#473a63"/>
  <text x="348" y="114" fill="#c4b5fd" font-size="14" font-weight="700">MBD 工程化</text>
  <text x="348" y="134" fill="#7a7290" font-size="10.5">面向汽车 / 嵌入式 / 认证</text>
  <g font-size="11.5" fill="#d7cef0">
    <text x="348" y="166">🪄 批量编辑（逐个 diff 确认）</text>
    <text x="348" y="196">🧪▶ 测试编排（生成→跑→汇总）</text>
    <text x="348" y="226">📋 需求追溯（双向矩阵）</text>
    <text x="348" y="256">🔬 代码评审（MISRA-C + 复杂度）</text>
    <text x="348" y="286">🔄 自愈验证环（run→修→重跑）</text>
    <text x="348" y="316">📸 画布截图分析（多模态）</text>
    <text x="348" y="346">✔ 标准检查 / 🧪 生成测试</text>
    <text x="348" y="376">📌 经验库 / 📄 SWDD / ◈ 版本 diff</text>
  </g>
  <rect x="348" y="396" width="240" height="42" rx="8" fill="#2c2440" stroke="#473a63"/>
  <text x="468" y="421" fill="#cbbff0" font-size="11" text-anchor="middle">Embedded Coder / Requirements</text>
  <text x="468" y="437" fill="#7a7290" font-size="9.5" text-anchor="middle">Toolbox 检测，按能力自适应</text>

  <!-- col 3: 会话与平台 -->
  <rect x="620" y="86" width="264" height="446" rx="12" fill="#221a30" stroke="#3a3050"/>
  <text x="640" y="114" fill="#c4b5fd" font-size="14" font-weight="700">会话与平台</text>
  <g font-size="11.5" fill="#d7cef0">
    <text x="640" y="146">🔀 双后端运行时切换</text>
    <text x="640" y="176">⚡ Claude 常驻进程（免冷启）</text>
    <text x="640" y="206">🗂 多标签 + 卡片 Fork 分支</text>
    <text x="640" y="236">💾 会话持久化 + 按项目恢复</text>
    <text x="640" y="266">⬇ 导出 Markdown</text>
    <text x="640" y="296">📁 工程级全工程索引</text>
    <text x="640" y="326">☑ 任务清单可视化</text>
    <text x="640" y="356">⌨ Ctrl+K 命令面板 + 快捷键</text>
    <text x="640" y="386">📝 批注 / 队列 / 引导 / Esc 中断</text>
    <text x="640" y="416">🎨 主题三选 + 轮次导航轨</text>
  </g>
  <rect x="640" y="436" width="224" height="40" rx="8" fill="#2c2440" stroke="#473a63"/>
  <text x="752" y="461" fill="#cbbff0" font-size="11" text-anchor="middle">无 CDN · 零 npm 依赖</text>

  <text x="460" y="552" fill="#6b6480" font-size="10.5" text-anchor="middle">65 项 sidecar · 8 项 UI 回归 · MATLAB R2025b 真实 Panel 隔离验证</text>
</svg>

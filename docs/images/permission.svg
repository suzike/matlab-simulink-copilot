<svg viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b1626"/><stop offset="1" stop-color="#16121f"/></linearGradient>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7a7290"/></marker>
  </defs>
  <rect width="920" height="480" rx="14" fill="url(#bg3)"/>
  <text x="36" y="42" fill="#f3f0fa" font-size="20" font-weight="700">权限与安全模型</text>
  <text x="36" y="64" fill="#9a92ad" font-size="12.5">MCP 工具与 MATLAB 本地确定性操作统一门控；绝不使用危险跳过权限参数。</text>

  <!-- start -->
  <rect x="36" y="92" width="200" height="44" rx="10" fill="#231b38" stroke="#7c3aed"/>
  <text x="136" y="111" fill="#e9d5ff" font-size="11.5" font-weight="600" text-anchor="middle">操作请求</text>
  <text x="136" y="126" fill="#b8acd3" font-size="10" text-anchor="middle">MCP 或 MATLAB 本地模块</text>

  <!-- decision: readonly -->
  <line x1="236" y1="114" x2="290" y2="114" stroke="#7a7290" stroke-width="1.6" marker-end="url(#a3)"/>
  <path d="M380,92 L470,128 L380,164 L290,128 Z" fill="#1f2937" stroke="#475569"/>
  <text x="380" y="124" fill="#cbd5e1" font-size="11" text-anchor="middle">只读工具 /</text>
  <text x="380" y="139" fill="#cbd5e1" font-size="11" text-anchor="middle">只读自省?</text>

  <rect x="520" y="106" width="180" height="44" rx="10" fill="#14361f" stroke="#2f7d4f"/>
  <text x="610" y="133" fill="#86efac" font-size="12" font-weight="600" text-anchor="middle">✓ 自动放行</text>
  <line x1="470" y1="128" x2="518" y2="128" stroke="#7a7290" stroke-width="1.6" marker-end="url(#a3)"/>
  <text x="494" y="120" fill="#86efac" font-size="10">是</text>
  <text x="730" y="124" fill="#7a8a7f" font-size="10">model_read / model_overview…</text>
  <text x="730" y="140" fill="#7a8a7f" font-size="10">help/which/exist/lookfor 单条</text>

  <!-- down: not readonly -> mode -->
  <line x1="380" y1="164" x2="380" y2="196" stroke="#7a7290" stroke-width="1.6" marker-end="url(#a3)"/>
  <text x="392" y="186" fill="#9a92ad" font-size="10">否（破坏性工具）→ 按「编辑模式」判定</text>

  <!-- mode lanes -->
  <rect x="36" y="206" width="270" height="120" rx="10" fill="#241d35" stroke="#3a3050"/>
  <text x="52" y="230" fill="#c4b5fd" font-size="13" font-weight="700">✋ Ask（默认）</text>
  <text x="52" y="254" fill="#cbbff0" font-size="11">每次改模型 / 写文件 / 跑代码</text>
  <text x="52" y="274" fill="#cbbff0" font-size="11">都弹 UI 确认卡（带 diff 预览）</text>
  <rect x="52" y="288" width="238" height="26" rx="6" fill="#2a1e1e" stroke="#7c4a2a"/>
  <text x="171" y="305" fill="#fbbf24" font-size="11" text-anchor="middle">⚠ 用户点确认才执行</text>

  <rect x="324" y="206" width="270" height="120" rx="10" fill="#241d35" stroke="#3a3050"/>
  <text x="340" y="230" fill="#c4b5fd" font-size="13" font-weight="700">⚙ Auto（自动编辑）</text>
  <text x="340" y="254" fill="#86efac" font-size="11">改模型 / 写文件 → 自动放行</text>
  <text x="340" y="276" fill="#fbbf24" font-size="11">运行代码 / 跑测试 / shell</text>
  <rect x="340" y="288" width="238" height="26" rx="6" fill="#2a1e1e" stroke="#7c4a2a"/>
  <text x="459" y="305" fill="#fbbf24" font-size="11" text-anchor="middle">⚠ 执行类仍需确认</text>

  <rect x="612" y="206" width="272" height="120" rx="10" fill="#241d35" stroke="#3a3050"/>
  <text x="628" y="230" fill="#c4b5fd" font-size="13" font-weight="700">▤ Plan（计划）</text>
  <text x="628" y="254" fill="#cbbff0" font-size="11">只读探索、给方案</text>
  <text x="628" y="276" fill="#cbbff0" font-size="11">MCP 与本地副作用操作一律拒绝</text>
  <rect x="628" y="288" width="240" height="26" rx="6" fill="#14361f" stroke="#2f7d4f"/>
  <text x="748" y="305" fill="#86efac" font-size="10.5" text-anchor="middle">sidecar + ConfigByConv 双层强制只读</text>

  <!-- bottom safety bar -->
  <rect x="36" y="346" width="848" height="100" rx="12" fill="#221a30" stroke="#3a3050"/>
  <text x="52" y="372" fill="#c4b5fd" font-size="13" font-weight="700">兜底与纵深防御</text>
  <g font-size="11" fill="#cbbff0">
    <text x="52" y="396">● 面板未连接 → 破坏性操作默认拒绝</text>
    <text x="52" y="418">● 确认请求 180s 超时 → 默认拒绝</text>
    <text x="52" y="440">● control 断开 / 会话关闭 → 清理悬挂请求</text>
    <text x="470" y="396">● 自动放行严格门控：多代码字段一律不放行</text>
    <text x="470" y="418">● 审计先记 pending，执行结果再转 ok / failed</text>
    <text x="470" y="440">● 本地写入、仿真、测试也必须经同一确认卡</text>
  </g>
</svg>

<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1729"/><stop offset="1" stop-color="#181321"/>
    </linearGradient>
    <linearGradient id="ubub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="brandg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="760" height="720" rx="12" fill="url(#panel)" stroke="#322a47"/>

  <!-- ── 顶栏 ── -->
  <rect x="0" y="0" width="760" height="42" rx="12" fill="#211a31"/>
  <rect x="0" y="30" width="760" height="12" fill="#211a31"/>
  <text x="18" y="27" fill="#c084fc" font-size="16">✦</text>
  <rect x="40" y="11" width="70" height="22" rx="6" fill="#2e2742" stroke="#473a63"/>
  <rect x="40" y="31" width="70" height="2" fill="#a855f7"/>
  <text x="75" y="26" fill="#ece8f6" font-size="11" text-anchor="middle">会话 1</text>
  <rect x="116" y="11" width="22" height="22" rx="6" fill="none" stroke="#3a3050"/>
  <text x="127" y="27" fill="#9a92ad" font-size="14" text-anchor="middle">+</text>
  <text x="660" y="27" fill="#9a92ad" font-size="11">▦ 3 项</text>
  <circle cx="712" cy="21" r="4" fill="#46d18a"/>
  <text x="724" y="25" fill="#7fd9a0" font-size="10">已就绪</text>

  <!-- ── 工具栏 ── -->
  <rect x="12" y="52" width="180" height="26" rx="6" fill="#2a2340" stroke="#473a63"/>
  <circle cx="28" cy="65" r="4" fill="#a855f7"/>
  <text x="40" y="69" fill="#ece8f6" font-size="11" font-weight="600">Claude Code</text>
  <text x="120" y="69" fill="#9a92ad" font-size="10">▾ sonnet</text>
  <rect x="200" y="52" width="92" height="26" rx="6" fill="#2a2340" stroke="#473a63"/>
  <text x="246" y="69" fill="#cbbff0" font-size="10.5" text-anchor="middle">思考·中 ▾</text>
  <rect x="300" y="52" width="150" height="26" rx="6" fill="#2a2340" stroke="#473a63"/>
  <text x="375" y="69" fill="#cbbff0" font-size="10.5" text-anchor="middle">✋ Ask before edits ▾</text>
  <rect x="458" y="52" width="78" height="26" rx="6" fill="#3a2a52" stroke="#7c3aed"/>
  <text x="497" y="69" fill="#e9d5ff" font-size="10.5" text-anchor="middle">⚡ 常驻</text>
  <rect x="640" y="52" width="108" height="26" rx="6" fill="#211a31" stroke="#322a47"/>
  <text x="694" y="69" fill="#7fd9a0" font-size="10" text-anchor="middle" font-family="monospace">$0.0042</text>

  <!-- ── 快捷动作 ── -->
  <g font-size="10.5">
    <rect x="12" y="86" width="86" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="55" y="102" fill="#d7cef0" text-anchor="middle">🩺 诊断报错</text>
    <rect x="104" y="86" width="86" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="147" y="102" fill="#d7cef0" text-anchor="middle">🧩 解释模块</text>
    <rect x="196" y="86" width="86" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="239" y="102" fill="#d7cef0" text-anchor="middle">🪄 批量编辑</text>
    <rect x="288" y="86" width="92" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="334" y="102" fill="#d7cef0" text-anchor="middle">🧪▶ 测试编排</text>
    <rect x="386" y="86" width="86" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="429" y="102" fill="#d7cef0" text-anchor="middle">🔄 自愈运行</text>
    <rect x="478" y="86" width="86" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="521" y="102" fill="#d7cef0" text-anchor="middle">📋 需求追溯</text>
    <rect x="572" y="86" width="86" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="615" y="102" fill="#d7cef0" text-anchor="middle">📸 截图分析</text>
    <rect x="664" y="86" width="84" height="24" rx="6" fill="#241d35" stroke="#3a3050"/><text x="706" y="102" fill="#d7cef0" text-anchor="middle">🔬 代码评审</text>
  </g>

  <!-- ── 对话区 ── -->
  <!-- 用户气泡 -->
  <rect x="330" y="128" width="404" height="34" rx="10" fill="url(#ubub)"/>
  <text x="350" y="149" fill="#fff" font-size="12">解释当前 Simulink 模型，并把 Gain 模块改成 2</text>

  <!-- 思考块 -->
  <rect x="26" y="174" width="320" height="26" rx="8" fill="#241a38" stroke="#4a3a6b"/>
  <text x="40" y="191" fill="#b69be8" font-size="11">💭 思考过程：先读模型结构、定位 Gain…</text>

  <!-- 工具卡 -->
  <rect x="26" y="210" width="500" height="48" rx="8" fill="#15282d" stroke="#2b6a72"/>
  <text x="40" y="230" fill="#5eead4" font-size="11" font-weight="600">🔧 model_overview</text>
  <text x="470" y="230" fill="#46d18a" font-size="12" text-anchor="end">✓</text>
  <text x="40" y="248" fill="#88c9c0" font-size="10.5">vdp：2 个积分器 + 1 个 Gain(mu=1) + Scope</text>

  <!-- 助手气泡 -->
  <rect x="26" y="268" width="560" height="92" rx="10" fill="#221c33" stroke="#352c4c"/>
  <text x="42" y="290" fill="#ece8f6" font-size="12">当前模型是 </text>
  <text x="118" y="290" fill="#ece8f6" font-size="12" font-weight="700">Van der Pol 振荡器</text>
  <text x="248" y="290" fill="#ece8f6" font-size="12">(vdp)：</text>
  <text x="42" y="312" fill="#c7bfd8" font-size="11.5">• 两个积分器构成二阶非线性系统</text>
  <text x="42" y="332" fill="#c7bfd8" font-size="11.5">• </text>
  <rect x="54" y="322" width="34" height="15" rx="3" fill="#2c2440"/>
  <text x="71" y="333" fill="#d8b4fe" font-size="10.5" text-anchor="middle" font-family="monospace">Gain</text>
  <text x="92" y="332" fill="#c7bfd8" font-size="11.5">模块控制非线性阻尼系数 μ</text>
  <text x="42" y="352" fill="#c7bfd8" font-size="11.5">下面把 Gain 改成 2（将弹出确认）：</text>

  <!-- ── 权限确认卡(带 diff) ── -->
  <rect x="26" y="372" width="708" height="150" rx="10" fill="#2a1e1e" stroke="#7c4a2a"/>
  <text x="44" y="396" fill="#fbbf24" font-size="13" font-weight="700">⚠ 需要确认：修改模型</text>
  <text x="716" y="396" fill="#9a92ad" font-size="10" text-anchor="end">mcp__matlab__model_edit · 破坏性操作</text>
  <!-- diff table -->
  <rect x="44" y="408" width="672" height="64" rx="6" fill="#1d1726"/>
  <text x="60" y="426" fill="#8a829c" font-size="9.5" font-weight="600">模型</text>
  <text x="200" y="426" fill="#8a829c" font-size="9.5" font-weight="600">模块</text>
  <text x="420" y="426" fill="#8a829c" font-size="9.5" font-weight="600">参数</text>
  <text x="560" y="426" fill="#8a829c" font-size="9.5" font-weight="600">新值</text>
  <line x1="56" y1="432" x2="704" y2="432" stroke="#3a3050"/>
  <text x="60" y="452" fill="#d7cef0" font-size="11" font-family="monospace">vdp</text>
  <text x="200" y="452" fill="#d7cef0" font-size="11" font-family="monospace">vdp/Mu</text>
  <text x="420" y="452" fill="#d7cef0" font-size="11" font-family="monospace">Gain</text>
  <rect x="556" y="440" width="40" height="18" rx="4" fill="#14361f"/>
  <text x="576" y="453" fill="#5ee08a" font-size="11" text-anchor="middle" font-family="monospace" font-weight="700">2</text>
  <!-- buttons -->
  <rect x="520" y="484" width="92" height="28" rx="7" fill="#2c2440" stroke="#473a63"/>
  <text x="566" y="502" fill="#cbbff0" font-size="11.5" text-anchor="middle">拒绝</text>
  <rect x="622" y="484" width="94" height="28" rx="7" fill="url(#brandg)"/>
  <text x="669" y="502" fill="#fff" font-size="11.5" font-weight="600" text-anchor="middle">✓ 确认</text>

  <!-- ── 输入框 ── -->
  <rect x="12" y="540" width="640" height="44" rx="10" fill="#211a31" stroke="#3a3050"/>
  <text x="30" y="567" fill="#6b6480" font-size="12">问点什么…（Enter 发送，/ 斜杠命令，Ctrl+K 命令面板）</text>
  <rect x="660" y="540" width="88" height="44" rx="10" fill="url(#brandg)"/>
  <text x="704" y="567" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">➤ 发送</text>

  <text x="380" y="612" fill="#6b6480" font-size="10.5" text-anchor="middle">界面示意（深色主题；另支持 Light / 随 MATLAB 自动切换）</text>

  <!-- bottom legend -->
  <g font-size="10">
    <circle cx="120" cy="648" r="5" fill="#2563eb"/><text x="132" y="652" fill="#9a92ad">用户</text>
    <circle cx="200" cy="648" r="5" fill="#a855f7"/><text x="212" y="652" fill="#9a92ad">助手/思考</text>
    <circle cx="300" cy="648" r="5" fill="#5eead4"/><text x="312" y="652" fill="#9a92ad">工具调用</text>
    <circle cx="400" cy="648" r="5" fill="#fbbf24"/><text x="412" y="652" fill="#9a92ad">权限确认</text>
    <circle cx="500" cy="648" r="5" fill="#46d18a"/><text x="512" y="652" fill="#9a92ad">成本/状态</text>
  </g>
</svg>

<svg viewBox="0 0 920 390" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Microsoft YaHei,Arial,sans-serif">
  <defs>
    <linearGradient id="lifeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <marker id="lifeArrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="920" height="390" rx="14" fill="url(#lifeBg)"/>
  <text x="36" y="44" fill="#f8fafc" font-size="20" font-weight="700">多会话生命周期与竞态防护</text>
  <text x="36" y="66" fill="#94a3b8" font-size="12.5">每个 convId 独立维护 config、adapter、ready、generation、dispatchEpoch 与 closed 状态</text>

  <g font-size="12" text-anchor="middle">
    <rect x="36" y="102" width="150" height="92" rx="9" fill="#172554" stroke="#3b82f6"/>
    <text x="111" y="129" fill="#bfdbfe" font-weight="700">1. 创建会话</text>
    <text x="111" y="153" fill="#93c5fd">首消息携完整 config</text>
    <text x="111" y="174" fill="#93c5fd">closed = false</text>

    <rect x="210" y="102" width="150" height="92" rx="9" fill="#312e81" stroke="#818cf8"/>
    <text x="285" y="129" fill="#e0e7ff" font-weight="700">2. 启动屏障</text>
    <text x="285" y="153" fill="#c7d2fe">await adapter.start()</text>
    <text x="285" y="174" fill="#c7d2fe">ready Promise</text>

    <rect x="384" y="102" width="150" height="92" rx="9" fill="#064e3b" stroke="#10b981"/>
    <text x="459" y="129" fill="#d1fae5" font-weight="700">3. 安全派发</text>
    <text x="459" y="153" fill="#a7f3d0">校验 dispatchEpoch</text>
    <text x="459" y="174" fill="#a7f3d0">发送消息与附件</text>

    <rect x="558" y="102" width="150" height="92" rx="9" fill="#3f2d12" stroke="#f59e0b"/>
    <text x="633" y="129" fill="#fef3c7" font-weight="700">4. 配置重建</text>
    <text x="633" y="153" fill="#fde68a">generation + 1</text>
    <text x="633" y="174" fill="#fde68a">旧 adapter 事件失效</text>

    <rect x="732" y="102" width="152" height="92" rx="9" fill="#450a0a" stroke="#ef4444"/>
    <text x="808" y="129" fill="#fee2e2" font-weight="700">5. Stop / 关闭</text>
    <text x="808" y="153" fill="#fecaca">dispatchEpoch + 1</text>
    <text x="808" y="174" fill="#fecaca">清 pending 与临时文件</text>
  </g>

  <g stroke="#60a5fa" stroke-width="2" marker-end="url(#lifeArrow)">
    <line x1="186" y1="148" x2="207" y2="148"/>
    <line x1="360" y1="148" x2="381" y2="148"/>
    <line x1="534" y1="148" x2="555" y2="148"/>
    <line x1="708" y1="148" x2="729" y2="148"/>
  </g>

  <rect x="36" y="226" width="848" height="120" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="56" y="254" fill="#e2e8f0" font-size="13" font-weight="700">不变量</text>
  <g fill="#cbd5e1" font-size="11.5">
    <text x="56" y="282">A. 新 adapter 未 ready 前，用户消息只等待，不会落到旧配置。</text>
    <text x="56" y="307">B. Stop 既中断已运行任务，也取消尚未越过 ready 屏障的待派发消息。</text>
    <text x="486" y="282">C. 关闭标签或 Fork 后，迟到事件由 closed/generation 双重丢弃。</text>
    <text x="486" y="307">D. 上下文与附件按 convId 隔离；关闭/中断只清理目标会话。</text>
  </g>
  <text x="884" y="374" fill="#64748b" font-size="10" text-anchor="end">v0.11.0 reliability model</text>
</svg>

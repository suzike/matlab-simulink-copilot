<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="data:,">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MATLAB Copilot</title>
<style>
  /* ── 设计系统:精致工程控制台(暗色,贴合 MATLAB R2025b,语义化配色)──────────
     约束:uihtml 内嵌、无 CDN → 仅系统字体 + 内联 SVG。 */
  :root {
    --bg: #15161a; --surface: #1d1e24; --surface2: #25262e; --surface3: #2d2f38;
    --border: #34363f; --border2: #3f424d;
    --text: #e9eaee; --text2: #b9bbc5; --muted: #9b9da7; --faint: #6c6e7a;
    --brand1: #b06bff; --brand2: #7c5cff;      /* agent / 品牌:紫色科技 */
    --user: #4ea1ff; --user2: #2d7fe0;          /* 用户:冷蓝 */
    --think: #9b8cff;                            /* 思考:紫 */
    --tool: #2dd4bf;                             /* 工具:青 */
    --skill: #f5b945;                            /* 技能:金 */
    --ok: #46d18a; --warn: #f0a93b; --err: #ff6b6b;
    --code-bg: #121319; --shadow: 0 6px 20px rgba(0,0,0,.28);
    --mono: "Cascadia Code","JetBrains Mono","Consolas",monospace;
    --font: "Segoe UI Variable Display","Segoe UI","Microsoft YaHei",system-ui,sans-serif;
  }
  /* ── Light 主题:覆盖变量(保留紫色品牌)+ 两处硬编码玻璃条 ── */
  html[data-theme="light"] {
    --bg: #f5f6f9; --surface: #ffffff; --surface2: #eef0f4; --surface3: #e3e6ec;
    --border: #e2e4ea; --border2: #d2d5de;
    --text: #1b1c21; --text2: #4f5260; --muted: #5b5e6a; --faint: #8b8e9a;
    --brand1: #7c3aed; --brand2: #6d4aff;
    --user: #2563eb; --user2: #1d4ed8;
    --think: #6d4aff;
    --tool: #0d9488; --skill: #b8830a;
    --ok: #1a9d5f; --warn: #c47f15; --err: #db4b4b;
    --code-bg: #f1eefb; --shadow: 0 6px 20px rgba(30,30,60,.10);
  }
  html[data-theme="light"] body {
    background:
      radial-gradient(900px 360px at 100% -10%, rgba(124,58,237,.08), transparent 60%),
      radial-gradient(700px 320px at -10% 0%, rgba(37,99,235,.05), transparent 55%),
      var(--bg);
  }
  html[data-theme="light"] header,
  html[data-theme="light"] footer { background: rgba(255,255,255,.72); }
  /* Light:修正落在浅色表面上的浅色文字(用户气泡/报错/权限卡是深色自洽,不受影响)。 */
  html[data-theme="light"] .bubble.assistant strong { color: #15161a; }
  html[data-theme="light"] .bubble.assistant code { color: #6d28d9; }
  html[data-theme="light"] .think .th-head { color: #6d4aff; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(900px 360px at 100% -10%, rgba(176,107,255,.10), transparent 60%),
      radial-gradient(700px 320px at -10% 0%, rgba(78,161,255,.06), transparent 55%),
      var(--bg);
    color: var(--text); font-family: var(--font); font-size: 13px;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }

  /* ── 顶栏 ── */
  header { padding: 9px 13px; border-bottom: 1px solid var(--border); background: rgba(29,30,36,.7);
           backdrop-filter: blur(6px); display: flex; align-items: center; gap: 9px; }
  .brand { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
           background: linear-gradient(135deg, var(--brand1), var(--brand2)); color: #fff;
           box-shadow: 0 2px 10px rgba(124,92,255,.35); }
  .brand svg { width: 16px; height: 16px; }
  header .title { font-weight: 650; letter-spacing: .2px; white-space: nowrap; flex: 0 0 auto; }
  header .title small { color: var(--faint); font-weight: 400; margin-left: 5px; font-size: 10px; }
  header .status { margin-left: 8px; color: var(--muted); font-size: 11px; max-width: 38%;
                  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                  display: flex; align-items: center; gap: 6px; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: 0 0 auto; }
  .restore-divider { text-align: center; font-size: 10px; color: var(--faint); margin: 10px 0 6px;
                     padding: 3px 0; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); }
  .cost-bar { font-size: 10px; font-family: monospace; color: var(--text2);
              background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
              padding: 1px 6px; margin-left: 6px; white-space: nowrap; cursor: default; }
  .sdot.live { background: var(--ok); box-shadow: 0 0 0 0 rgba(70,209,138,.5); animation: pulse 1.8s infinite; }
  .sdot.busy { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(240,169,59,.5)} 70%{box-shadow:0 0 0 6px rgba(240,169,59,0)} 100%{box-shadow:0 0 0 0 rgba(240,169,59,0)} }

  /* ── 上下文图标(合进顶栏;悬停弹气泡看详情)── */
  #ctx-chip { display: inline-flex; align-items: center; gap: 5px; margin-left: auto; flex: 0 0 auto;
              padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface2);
              color: var(--muted); cursor: default; font-size: 11px; }
  #ctx-chip:hover { color: var(--text); border-color: var(--brand2); }
  #ctx-chip svg { width: 13px; height: 13px; opacity: .85; }
  #ctx-count { font-weight: 700; color: var(--brand1); }
  #ctx-chip.flash { animation: ctxflash .7s ease; }
  @keyframes ctxflash { 0% { background: rgba(176,107,255,.30); } 100% { background: var(--surface2); } }
  #ctx-pop { position: fixed; top: 46px; right: 10px; z-index: 40; width: 300px; max-height: 52vh; overflow-y: auto;
             background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 12px;
             box-shadow: 0 12px 40px rgba(0,0,0,.45); display: flex; flex-direction: column; gap: 4px;
             opacity: 0; transform: translateY(-4px); pointer-events: none; transition: opacity .12s, transform .12s; }
  #ctx-pop.show { opacity: 1; transform: translateY(0); }
  #ctx-pop .cp-title { font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .ctx-row { display: flex; gap: 8px; font-size: 11.5px; line-height: 1.5; }
  .ctx-row b { color: var(--faint); min-width: 52px; flex: 0 0 auto; font-weight: 500; }
  .ctx-row span { color: var(--text); word-break: break-all; }

  /* ── 标签页(并入顶部行,不单占一行)── */
  #tabs-list { display: flex; gap: 3px; flex: 0 1 auto; min-width: 0; overflow-x: auto; margin-left: 4px; align-items: center; }
  #tabs-list::-webkit-scrollbar { height: 0; }
  .tab { display: inline-flex; align-items: center; gap: 6px; max-width: 132px; height: 25px; padding: 0 10px; cursor: pointer;
         font-size: 11px; color: var(--muted); border: 1px solid transparent; border-radius: 7px; white-space: nowrap; flex: 0 0 auto;
         transition: background .15s ease, color .15s ease, border-color .15s ease; }
  .tab:hover { background: var(--surface2); color: var(--text); }
  /* 选中态:柔和底色 + 底部品牌色条指示,比整圈高亮边更精致清晰 */
  .tab.active { background: var(--surface3); color: var(--text); border-color: var(--border2);
                box-shadow: inset 0 -2px 0 var(--brand1); font-weight: 550; }
  .tab .tname { overflow: hidden; text-overflow: ellipsis; max-width: 92px; }
  .tab .tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex: 0 0 auto; display: none; }
  .tab.busy .tdot { display: inline-block; animation: pulse 1s infinite; }
  .tab .tx { opacity: .4; font-size: 14px; line-height: 1; width: 15px; height: 15px; display: inline-flex;
             align-items: center; justify-content: center; border-radius: 4px;
             transition: opacity .12s, background .12s, color .12s; }
  .tab .tx:hover { opacity: 1; color: var(--err); background: var(--surface); }
  .tname-input { background: var(--surface); border: 1px solid var(--brand2); color: var(--text);
                 border-radius: 5px; font: inherit; width: 88px; padding: 0 4px; outline: none; }
  /* 新建按钮:与标签同高、同圆角,透明底更轻盈,「+」严格居中 */
  #tab-add { flex: 0 0 auto; width: 25px; height: 25px; border-radius: 7px; border: 1px solid var(--border);
             display: inline-flex; align-items: center; justify-content: center;
             background: transparent; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1;
             transition: background .15s ease, color .15s ease, border-color .15s ease; }
  #tab-add:hover { color: var(--text); border-color: var(--brand2); background: var(--surface2); }

  /* ── 空会话寄语水印(品牌 + 作者,只在该标签无消息时显示)── */
  .welcome { margin: auto; text-align: center; color: var(--faint); padding: 24px; user-select: none; }
  .w-logo { font-size: 30px; color: var(--brand1); }
  .w-title { font-weight: 650; font-size: 15px; color: var(--text); margin-top: 6px; letter-spacing: .3px; }
  .w-motto { font-family: var(--mono); font-size: 12px; margin-top: 8px; }
  .w-motto em { font-style: normal; font-weight: 700;
                background: linear-gradient(135deg, var(--brand1), var(--user)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .w-sig { margin-top: 6px; font-size: 11px; font-weight: 700;
           background: linear-gradient(135deg, var(--brand1), var(--user)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  /* ── 消息区(每个标签页一个 pane)── */
  #panes { flex: 1; min-height: 0; display: flex; position: relative; }
  .pane { flex: 1; overflow-y: auto; padding: 14px 12px 14px 24px; display: none; flex-direction: column; gap: 12px; }   /* 左侧多留 gutter 给导航轨 */
  .pane.active { display: flex; }
  .pane::-webkit-scrollbar { width: 9px; }
  .pane::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 9px; border: 2px solid var(--bg); }
  /* flex:0 0 auto:防止 overflow:hidden 的卡片在 flex column 里塌成 0。 */
  .pane > * { flex: 0 0 auto; }
  /* ── 对话轮次导航轨(minimap + 跳转锚点):长对话把"找回某轮问答"从线性滚动变成可视索引 ── */
  /* 圆角浅框包裹刻度组,高度由 JS 按刻度数自适应(紧贴刻度,不留长空条) */
  #nav-rail { position: absolute; left: 5px; top: 16px; width: 19px; z-index: 6; display: none;
              padding: 5px 0; border-radius: 11px; pointer-events: none;
              background: color-mix(in srgb, var(--surface3) 72%, transparent);
              border: 1px solid var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  /* 刻度=短横线,等距紧凑排列(JS 按 top px 定位);hover/active 加长 */
  .nav-tick { position: absolute; left: 3px; width: 11px; height: 2.5px; border-radius: 2px;
              background: var(--border2); cursor: pointer; pointer-events: auto; transform: translateY(-50%);
              transition: background .14s, width .14s, box-shadow .14s; }
  .nav-tick:hover { background: var(--brand2); width: 15px; }
  .nav-tick.active { background: var(--brand2); width: 15px; height: 3px;
                     box-shadow: 0 0 0 1.5px color-mix(in srgb, var(--brand2) 30%, transparent); }
  .nav-preview { position: absolute; z-index: 7; left: 28px; min-width: 168px; max-width: 264px;
                 background: var(--surface3); border: 1px solid var(--border2); border-radius: 9px;
                 padding: 7px 9px; box-shadow: var(--shadow); font-size: 11px; line-height: 1.45;
                 pointer-events: none; display: none; }
  .nav-preview .np-idx { color: var(--muted); font-size: 9.5px; margin-bottom: 3px; letter-spacing: .04em; }
  .nav-preview .np-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin: 3px 0 1px;
                          font-size: 10px; color: var(--muted); }
  .nav-preview .np-meta .ok { color: #46d18a; }
  .nav-preview .np-meta .fail { color: #ff6b6b; }
  .nav-preview .np-dot { opacity: .4; }
  .nav-preview .np-q { color: var(--text); overflow: hidden; text-overflow: ellipsis;
                       display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  .nav-preview .np-tools { color: var(--tool); font-family: var(--mono); font-size: 10px; margin-top: 4px;
                           overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-preview .np-a { color: var(--muted); margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border2);
                       overflow: hidden; text-overflow: ellipsis;
                       display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  @keyframes turnFlash { 0% { box-shadow: 0 0 0 2px var(--brand2); } 100% { box-shadow: 0 0 0 0 transparent; } }
  .row.turn-flash .bubble { animation: turnFlash 1.1s ease; }
  .row { display: flex; gap: 9px; align-items: flex-start; animation: rowIn .26s cubic-bezier(.2,.7,.3,1) both; }
  .row.user { justify-content: flex-end; }
  @keyframes rowIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

  .avatar { width: 30px; height: 30px; border-radius: 9px; flex: 0 0 auto; display: grid; place-items: center;
            color: #fff; box-shadow: var(--shadow); animation: pop .3s ease both; }
  @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .avatar svg { width: 17px; height: 17px; }
  .avatar.assistant { background: linear-gradient(135deg, var(--brand1), var(--brand2)); }
  .avatar.user { background: linear-gradient(135deg, var(--user), var(--user2)); }

  .bubble { max-width: 82%; border-radius: 13px; padding: 9px 13px; line-height: 1.55; word-wrap: break-word;
            border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; }
  .bubble.assistant { background: linear-gradient(180deg, var(--surface2), var(--surface)); border-top-left-radius: 4px; }
  .bubble.user { background: linear-gradient(180deg, #243447, #1f2c3c); border: 1px solid #2c425c; border-top-right-radius: 4px; color: #eaf2fb; }
  .bubble.streaming::after { content: ''; display: inline-block; width: 7px; height: 1.05em; vertical-align: -2px;
            margin-left: 2px; background: var(--brand1); border-radius: 1px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* 错误横幅(无头像) */
  .banner.error { align-self: stretch; background: linear-gradient(180deg, #3a2226, #2c1a1e);
                  border: 1px solid var(--err); border-radius: 10px; padding: 10px 12px; color: #ffd5d5;
                  display: flex; gap: 8px; align-items: flex-start; animation: rowIn .26s ease both; }
  .banner.error svg { width: 16px; height: 16px; flex: 0 0 auto; margin-top: 1px; }

  /* ── 富文本(Markdown)排版 ── */
  .bubble p { margin: 6px 0; } .bubble p:first-child { margin-top: 0; } .bubble p:last-child { margin-bottom: 0; }
  .bubble h1,.bubble h2,.bubble h3,.bubble h4,.bubble h5,.bubble h6 { margin: 11px 0 6px; line-height: 1.3; font-weight: 650; }
  .bubble h1 { font-size: 1.38em; } .bubble h2 { font-size: 1.22em; } .bubble h3 { font-size: 1.1em; color: var(--brand1); }
  .bubble h4,.bubble h5,.bubble h6 { font-size: 1em; color: var(--muted); }
  .bubble ul,.bubble ol { margin: 6px 0; padding-left: 20px; } .bubble li { margin: 3px 0; }
  .bubble ul li::marker { color: var(--brand1); } .bubble ol li::marker { color: var(--brand1); }
  .bubble blockquote { margin: 7px 0; padding: 3px 12px; border-left: 3px solid var(--brand2);
                       background: rgba(124,92,255,.06); border-radius: 0 6px 6px 0; color: var(--muted); }
  .bubble code { background: var(--code-bg); border: 1px solid var(--border2); border-radius: 5px;
                 padding: .5px 5px; font-family: var(--mono); font-size: .9em; color: #d7c9ff; }
  .bubble hr { border: none; border-top: 1px solid var(--border2); margin: 9px 0; }
  .bubble strong { color: #fff; font-weight: 650; } .bubble em { font-style: italic; color: var(--text); }
  .bubble a { color: var(--user); text-decoration: none; border-bottom: 1px dashed rgba(78,161,255,.5); }
  .bubble a:hover { border-bottom-style: solid; }
  /* 气泡操作按钮(复制 / 编辑 / Fork)—— 悬停后在正文下方展开,并自然推开 Fork 和后续卡片 */
  .msg-actions { display: flex; gap: 6px; flex-wrap: wrap; opacity: 0; max-height: 0;
                 margin-top: 0; overflow: hidden; pointer-events: none;
                 transition: opacity .12s ease, max-height .12s ease, margin-top .12s ease; }
  .row:hover > .bubble > .msg-actions,
  .row:focus-within > .bubble > .msg-actions {
    opacity: 1; max-height: 80px; margin-top: 12px; pointer-events: auto;
  }
  .row.user > .bubble > .msg-actions { justify-content: flex-end; }
  .ma-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted);
            border-radius: 7px; padding: 2px 9px; font-size: 10.5px; cursor: pointer; transition: all .12s;
            display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; flex: 0 0 auto; }
  .ma-btn:hover { color: var(--text); border-color: var(--brand2); background: var(--surface3); }
  .row.user .ma-btn { border-color: rgba(255,255,255,.18); color: #cdd9e8; }
  .row.user .ma-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
  /* 气泡操作按钮按功能配色区分:复制=青 / 批注=黄(呼应高亮) / Fork=紫 */
  .ma-btn.act-copy { color: var(--tool); border-color: color-mix(in srgb, var(--tool) 40%, transparent); }
  .ma-btn.act-copy:hover { background: color-mix(in srgb, var(--tool) 14%, transparent); border-color: var(--tool); color: var(--tool); }
  .ma-btn.act-annot { color: #e0a92b; border-color: rgba(245,158,11,.45); }
  .ma-btn.act-annot:hover { background: rgba(245,158,11,.16); border-color: #f59e0b; color: #f59e0b; }
  .ma-btn.act-fork { color: #c084fc; border-color: rgba(168,85,247,.42); }
  .ma-btn.act-fork:hover { background: rgba(168,85,247,.16); border-color: var(--brand2); color: #d8b4fe; }
  /* 待发送队列:右下角浮动卡片(贴近输入区;队列模式回答中再发,在这里候着,依次自动发出) */
  .queue-panel { position: fixed; bottom: 155px; right: 14px; z-index: 1500; width: 240px;
                 max-height: 45vh; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .queue-panel.hidden { display: none; }
  .qp-title { font-size: 10.5px; color: #f59e0b; font-weight: 700; padding: 0 2px; }
  /* 待发送卡片【灰显】:虚线边 + 淡化 + 灰字,明确「未发出、排队中」,与主会话区分;悬停恢复清晰 */
  .queue-card { display: flex; align-items: center; gap: 6px; background: var(--surface);
                border: 1px dashed var(--border2); border-left: 3px dashed #f59e0b; border-radius: 8px;
                padding: 6px 8px; opacity: .62; filter: saturate(.6); transition: opacity .12s, filter .12s;
                box-shadow: 0 6px 18px rgba(0,0,0,.28); }
  .queue-card:hover { opacity: 1; filter: none; }
  .qc-n { font-size: 10px; color: var(--faint); font-weight: 700; flex: 0 0 auto; }
  .qc-text { flex: 1; font-size: 11px; color: var(--faint); font-style: italic;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qc-x { cursor: pointer; opacity: .5; font-size: 11px; flex: 0 0 auto; } .qc-x:hover { opacity: 1; color: var(--err); }
  /* 批注:选中气泡文字右键 → 浮动批注框 → 汇总进输入框 */
  .annotate-pop { position: fixed; z-index: 2000; width: 290px; background: var(--surface); border: 1px solid var(--brand2);
                  border-radius: 11px; padding: 11px; box-shadow: 0 10px 30px rgba(0,0,0,.45); }
  .annotate-pop.hidden { display: none; }
  .ap-snippet { font-size: 10.5px; color: var(--brand1); line-height: 1.4; margin-bottom: 7px;
                max-height: 50px; overflow: hidden; border-left: 2px solid var(--brand2); padding-left: 7px; }
  .ap-input { width: 100%; box-sizing: border-box; background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
              border-radius: 7px; padding: 6px 8px; font: inherit; font-size: 12px; resize: none; outline: none; min-height: 42px; }
  .ap-input:focus { border-color: var(--brand2); }
  .ap-row { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; }
  .fi-btn { background: var(--surface3); border: 1px solid var(--border2); color: var(--text); border-radius: 7px;
            padding: 4px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .fi-btn:hover { border-color: var(--brand2); color: var(--text); }
  .fi-btn.primary { background: linear-gradient(135deg, var(--brand1), var(--brand2)); border-color: transparent; color: #fff; font-weight: 600; }
  /* 已批注的文字段:持久黄色高亮,标识追问针对哪段(亮/暗主题均可读) */
  mark.annot-mark { background: rgba(250, 204, 21, .32); color: inherit; border-radius: 3px; padding: 0 1px;
                    box-shadow: inset 0 0 0 1px rgba(250, 204, 21, .35); }
  /* 待发送批注:便签卡片(贴在输入框上方,黄色便利贴风格,呼应高亮色)*/
  .notes-area { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 7px; }
  .notes-area:empty { display: none; }
  .sticky-note { position: relative; max-width: 230px; background: rgba(250, 204, 21, .1);
                 border: 1px solid rgba(250, 204, 21, .35); border-left: 3px solid #facc15;
                 border-radius: 7px; padding: 6px 22px 6px 9px; line-height: 1.35; }
  .sn-anchor { font-size: 9.5px; color: #d9a40f; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  html[data-theme=light] .sn-anchor { color: #a9780a; }
  .sn-q { font-size: 11.5px; color: var(--text); word-break: break-word; }
  .sn-x { position: absolute; top: 4px; right: 5px; font-size: 11px; cursor: pointer; opacity: .5; line-height: 1; }
  .sn-x:hover { opacity: 1; color: var(--err); }
  /* Fork 分支区(嵌在卡片内) */
  .fork-zone { margin-top: 10px; border-top: 1px dashed var(--brand2); padding-top: 8px; }
  .fork-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 10.5px; color: var(--brand1); font-weight: 600; margin-bottom: 7px; }
  .fork-close { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 1px 3px; }
  .fork-close:hover { color: var(--err); }
  .fork-msgs { display: flex; flex-direction: column; gap: 8px; }
  .fork-msgs:empty { display: none; }
  .fork-msgs .avatar { width: 22px; height: 22px; } .fork-msgs .avatar svg { width: 12px; height: 12px; }
  .fork-msgs .bubble { box-shadow: none; font-size: 12.5px; }
  .fork-input-row { display: flex; gap: 6px; margin-top: 8px; align-items: flex-end; }
  .fork-input { flex: 1; background: var(--surface); border: 1px solid var(--border2); color: var(--text);
                border-radius: 8px; padding: 5px 8px; font: inherit; font-size: 12px; resize: none; max-height: 80px; }
  .fork-input:focus { outline: none; border-color: var(--brand2); }
  .fork-send { flex: 0 0 auto; background: linear-gradient(135deg, var(--brand1), var(--brand2)); color: #fff; border: none;
               border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .fork-send:disabled { opacity: .5; cursor: default; }
  .bubble table { border-collapse: collapse; margin: 7px 0; font-size: .95em; width: 100%; }
  .bubble th,.bubble td { border: 1px solid var(--border2); padding: 4px 9px; text-align: left; }
  .bubble th { background: var(--surface3); color: var(--text); }
  .bubble tr:nth-child(even) td { background: rgba(255,255,255,.02); }

  /* 代码块(带语言头) */
  .codeblock { margin: 8px 0; border: 1px solid var(--border2); border-radius: 9px; overflow: hidden; background: var(--code-bg); }
  .codeblock .cb-head { display: flex; align-items: center; gap: 6px; padding: 4px 10px; font-size: 10.5px;
                        color: var(--faint); background: rgba(255,255,255,.025); border-bottom: 1px solid var(--border);
                        font-family: var(--mono); letter-spacing: .4px; text-transform: uppercase; }
  .codeblock .cb-head .dotrow { display: flex; gap: 4px; margin-right: 4px; }
  .codeblock .cb-head i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .codeblock pre { margin: 0; padding: 9px 11px; overflow-x: auto; font-family: var(--mono); font-size: 12px; line-height: 1.5; }
  .bubble pre.code { background: var(--code-bg); border: 1px solid var(--border2); border-radius: 8px;
                     padding: 9px 11px; overflow-x: auto; font-family: var(--mono); font-size: 12px; margin: 8px 0; }
  .codeblock pre code, .bubble pre.code code { background: none; border: none; padding: 0; color: inherit; }

  /* ── 思考过程块 ── */
  .think { margin-left: 39px; max-width: calc(82% - 0px); background: linear-gradient(180deg, rgba(155,140,255,.08), rgba(155,140,255,.03));
           border: 1px solid rgba(155,140,255,.28); border-left: 3px solid var(--think); border-radius: 10px;
           padding: 7px 11px; font-size: 12px; color: var(--muted); animation: rowIn .26s ease both; }
  .think .th-head { cursor: pointer; user-select: none; display: flex; gap: 7px; align-items: center; color: #c5bdff; font-weight: 500; }
  .think .th-head svg { width: 14px; height: 14px; }
  .think.thinking .th-head svg { animation: spin 2.4s linear infinite; }
  .think .th-caret { margin-left: auto; transition: transform .15s; opacity: .7; }
  .think.collapsed .th-caret { transform: rotate(-90deg); }
  .think .th-body { margin-top: 7px; line-height: 1.5; border-top: 1px dashed rgba(155,140,255,.2); padding-top: 6px; }
  .think .th-body p { margin: 4px 0; } .think.collapsed .th-body { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 工具 / 技能调用卡片 ── */
  .tool { margin-left: 39px; max-width: calc(82% - 0px); background: var(--surface2); border: 1px solid var(--border2);
          border-radius: 10px; overflow: hidden; font-size: 12px; animation: rowIn .26s ease both; }
  .tool .head { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 7px 11px; }
  .tool .ticon { width: 22px; height: 22px; border-radius: 6px; flex: 0 0 auto; display: grid; place-items: center; color: #08110f; }
  .tool .ticon svg { width: 13px; height: 13px; }
  .tool.kind-tool .ticon { background: var(--tool); } .tool.kind-skill .ticon { background: var(--skill); }
  .tool.kind-file .ticon { background: #7aa2ff; } .tool.kind-bash .ticon { background: #c4c8d4; }
  .tool .name { font-family: var(--mono); color: var(--text); font-size: 11.5px; }
  .tool .kindtag { font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px; color: var(--faint); }
  .tool .pill { margin-left: auto; font-size: 10.5px; padding: 1px 8px; border-radius: 999px; display: inline-flex; gap: 5px; align-items: center; }
  .tool .pill .spin { width: 10px; height: 10px; border: 2px solid var(--warn); border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  .tool.run .pill { color: var(--warn); background: rgba(240,169,59,.12); }
  .tool.ok .pill { color: var(--ok); background: rgba(70,209,138,.12); }
  .tool.fail .pill { color: var(--err); background: rgba(255,107,107,.12); }
  .tool .body { display: none; padding: 0 11px 9px 41px; }
  .tool.open .body { display: block; }
  .tool .body pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 7px; padding: 7px;
                    overflow: auto; font-family: var(--mono); font-size: 11px; margin: 5px 0 0; max-height: 230px; }
  .tool .body .lbl { font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }

  /* ── 模型语义 diff 卡片(model_edit 前后对比:参数表 + 增删块 + 画布截图)── */
  .mdiff { margin-left: 39px; max-width: calc(82% - 0px); background: var(--surface2);
           border: 1px solid color-mix(in srgb, var(--brand2) 45%, var(--border2)); border-radius: 10px;
           overflow: hidden; font-size: 12px; animation: rowIn .26s ease both; }
  .mdiff .head { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 7px 11px;
                 color: var(--text); background: color-mix(in srgb, var(--brand2) 10%, transparent); }
  .mdiff .head .mdicon { color: var(--brand2); }
  .mdiff .head .mdsum { margin-left: auto; font-size: 10.5px; color: var(--muted); }
  .mdiff .body { display: none; padding: 8px 11px 10px; }
  .mdiff.open .body { display: block; }
  .mdiff table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
  .mdiff th { text-align: left; color: var(--faint); font-weight: 500; font-size: 10px; padding: 2px 6px;
              border-bottom: 1px solid var(--border); }
  .mdiff td { padding: 3px 6px; border-bottom: 1px solid var(--border); vertical-align: top; word-break: break-all; }
  .mdiff td.md-before { color: var(--err); text-decoration: line-through; text-decoration-color: rgba(255,107,107,.5); }
  .mdiff td.md-after { color: var(--ok); }
  .mdiff .md-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .mdiff .md-chip { font-family: var(--mono); font-size: 10.5px; padding: 1px 8px; border-radius: 999px; }
  .mdiff .md-chip.add { color: var(--ok); background: rgba(70,209,138,.12); }
  .mdiff .md-chip.del { color: var(--err); background: rgba(255,107,107,.12); }
  .mdiff .md-shots { display: flex; gap: 7px; margin-top: 8px; }
  .mdiff .md-shot { flex: 1; min-width: 0; }
  .mdiff .md-shot .cap { font-size: 9.5px; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .mdiff .md-shot img { width: 100%; border: 1px solid var(--border); border-radius: 7px; cursor: zoom-in;
                        background: #fff; }
  .mdiff .md-shot img.zoom { position: fixed; inset: 4% 3%; width: auto; max-width: 94%; max-height: 92%;
                             margin: auto; z-index: 40; cursor: zoom-out; box-shadow: 0 12px 48px rgba(0,0,0,.55); object-fit: contain; }

  /* 规范检查报告卡(复用 .mdiff 骨架)+ 卡片内操作按钮行 */
  .mdiff td.sev-error { color: var(--err); }
  .mdiff td.sev-warn { color: var(--warn); }
  .mdiff td.sev-ok { color: var(--ok); }
  .mdiff .md-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .mdiff .md-actions .ma-btn { font-size: 11px; padding: 3px 10px; }
  .mdiff .ma-btn.act-ai { color: var(--brand2); border-color: color-mix(in srgb, var(--brand2) 45%, transparent); }
  .mdiff .ma-btn.act-ai:hover { background: color-mix(in srgb, var(--brand2) 14%, transparent); }

  /* 情境建议条(nudge):贴在输入区上方,确定性规则触发,可点可关,绝不打断 */
  #nudge-bar { position: absolute; left: 10px; bottom: 4px; z-index: 8; display: none;
               max-width: 78%; background: color-mix(in srgb, var(--brand2) 12%, var(--surface3));
               border: 1px solid color-mix(in srgb, var(--brand2) 45%, var(--border2));
               border-radius: 10px; padding: 6px 10px; font-size: 11.5px; color: var(--text);
               box-shadow: var(--shadow); display: none; align-items: center; gap: 8px; }
  #nudge-bar.show { display: flex; }
  #nudge-bar .nb-msg { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #nudge-bar .nb-act { color: var(--brand2); cursor: pointer; white-space: nowrap; font-weight: 600; }
  #nudge-bar .nb-x { color: var(--muted); cursor: pointer; padding: 0 2px; white-space: nowrap; }

  /* ── 权限确认 ── */
  .perm { margin-left: 39px; max-width: calc(82% - 0px); background: linear-gradient(180deg, #322a16, #2a230f);
          border: 1px solid var(--warn); border-radius: 10px; padding: 11px; animation: rowIn .26s ease both; }
  .perm .q { margin-bottom: 8px; display: flex; gap: 7px; align-items: center; color: #ffe2ad; }
  .perm .q svg { width: 16px; height: 16px; flex: 0 0 auto; }
  .perm .tool-name { font-family: var(--mono); color: var(--warn); }
  .perm .diff-model, .perm .diff-file, .perm .diff-block, .perm .diff-param { color: #f3e8c7; }
  .perm .diff-model code { color: #fff5d6; background: rgba(0,0,0,.28); }
  .perm pre { background: var(--code-bg); border-radius: 7px; padding: 7px; overflow: auto; font-size: 11px; max-height: 170px; margin: 0 0 9px; }
  .perm .btns { display: flex; gap: 8px; }
  .perm button { border: none; border-radius: 8px; min-width: max-content; padding: 6px 16px; cursor: pointer;
                 font-size: 12px; font-weight: 600; line-height: 1; white-space: nowrap; flex: 0 0 auto;
                 display: inline-flex; align-items: center; justify-content: center; }
  .perm .allow { background: linear-gradient(135deg, var(--ok), #2fae72); color: #06140d; }
  .perm .deny { background: var(--surface3); color: var(--text); border: 1px solid var(--border2); }
  .perm.resolved { opacity: .55; } .perm.resolved button { display: none; }
  /* 任务清单 - [ ] / - [x] */
  .todo-list { list-style: none; padding: 0; margin: 6px 0; }
  .todo-item { display: flex; align-items: flex-start; gap: 7px; padding: 2px 0; }
  .todo-item label { display: flex; align-items: flex-start; gap: 7px; cursor: pointer; }
  .todo-cb { margin-top: 3px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .todo-done { text-decoration: line-through; color: var(--text2); }
  /* model_edit 改动预览表格 */
  .diff-model { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .diff-model code { color: var(--text); background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); }
  .diff-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 9px; }
  .diff-table th { text-align: left; padding: 3px 8px; background: rgba(255,255,255,.05); color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .diff-table td { padding: 4px 8px; border-top: 1px solid var(--border); font-family: var(--mono); }
  .diff-block { color: var(--text2); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .diff-param { color: var(--text); }
  .diff-new { color: #4ade80; font-weight: 600; }
  .perm .diff-code { background: var(--code-bg); border-radius: 7px; padding: 7px; overflow: auto; font-size: 11px; max-height: 170px; margin: 0 0 9px; font-family: var(--mono); white-space: pre-wrap; word-break: break-all; }
  .diff-file { font-size: 11px; color: var(--text); margin-bottom: 9px; font-family: var(--mono); }

  /* ── 结构化诊断卡片 ── */
  .diagcard { align-self: stretch; background: var(--surface); border: 1px solid var(--border2);
              border-radius: 11px; padding: 9px 11px; margin: 4px 0; animation: rowIn .26s ease both; }
  .diag-head { font-weight: 600; font-size: 12px; margin-bottom: 6px; color: var(--text); }
  .diag-row { display: flex; gap: 8px; padding: 6px 0; border-top: 1px solid var(--border); }
  .diag-row:nth-of-type(1) { border-top: none; }
  .diag-ic { flex: 0 0 auto; }
  .diag-row.err .diag-ic { color: var(--err); }
  .diag-row.warn .diag-ic { color: var(--warn); }
  .diag-row.info .diag-ic { color: var(--user); }
  .diag-b { min-width: 0; flex: 1; }
  .diag-msg { font-size: 12px; line-height: 1.45; word-break: break-word; }
  .diag-id { display: inline-block; margin-top: 2px; font-size: 10px; color: var(--faint); font-family: var(--mono); }
  .diag-jump { display: block; margin-top: 5px; background: var(--surface3); border: 1px solid var(--border2);
               color: var(--brand1); border-radius: 7px; padding: 3px 9px; font-size: 11px; cursor: pointer; }
  .diag-jump:hover { border-color: var(--brand2); background: var(--surface2); }

  /* ── 变更记录(操作审计)弹窗 ── */
  #audit-pop { width: 340px; max-height: 320px; overflow-y: auto; }
  #recorder-pop { width: min(380px, calc(100vw - 24px));
                  max-height: min(560px, calc(100vh - var(--footer-h, 64px) - 70px)); overflow-y: auto; }
  #mbse-pop { width: min(410px, calc(100vw - 24px));
              max-height: min(570px, calc(100vh - var(--footer-h, 64px) - 70px)); overflow-y: auto; }
  #tb-mbse.active { color: var(--brand1); border-color: var(--brand2); background: rgba(124,92,255,.1); }
  .mbse-head { padding: 7px; border-bottom: 1px solid var(--border); }
  .mbse-head b { display:block; font-size:12px; }
  .mbse-head small { display:block; margin-top:2px; color:var(--muted); font-size:10px; overflow-wrap:anywhere; }
  .mbse-phases { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; padding:8px 7px; }
  .mbse-phase { min-width:0; height:34px; border:1px solid var(--border2); border-radius:6px;
                background:var(--surface3); color:var(--muted); cursor:pointer; font:10px var(--sans); }
  .mbse-phase b { display:block; font-size:11px; }
  .mbse-phase.active { color:var(--brand1); border-color:var(--brand2); }
  .mbse-phase:disabled { opacity:.42; cursor:default; }
  .mbse-fields { display:grid; gap:5px; padding:8px 7px; border-top:1px solid var(--border); }
  .mbse-fields input, .mbse-fields textarea, .mbse-fields select { width:100%; box-sizing:border-box;
    border:1px solid var(--border2); border-radius:6px; background:var(--surface); color:var(--text);
    padding:5px 7px; font:11px var(--sans); letter-spacing:0; }
  .mbse-fields textarea { min-height:42px; max-height:72px; resize:vertical; }
  .mbse-meta { padding:6px 8px; color:var(--muted); font-size:10px; line-height:1.5; overflow-wrap:anywhere; }
  .mbse-actions { display:flex; gap:5px; padding:8px 7px; border-top:1px solid var(--border); }
  .mbse-actions button { min-width:0; flex:1 1 auto; height:28px; border:1px solid var(--border2); border-radius:6px;
                         background:var(--surface3); color:var(--text); cursor:pointer; font-size:10px; }
  .mbse-actions button:disabled { opacity:.38; cursor:default; }
  #tb-recorder.recording { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,.1); }
  .rec-head { display:flex; align-items:center; gap:8px; padding:4px 7px 9px; border-bottom:1px solid var(--border); }
  .rec-dot { width:8px; height:8px; border-radius:50%; background:var(--faint); flex:0 0 auto; }
  .rec-dot.live { background:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.15); }
  .rec-summary { min-width:0; flex:1; }
  .rec-summary b { display:block; font-size:12px; }
  .rec-summary small { color:var(--muted); font-size:10px; overflow-wrap:anywhere; }
  .rec-actions { display:flex; gap:5px; padding:8px 7px; }
  .rec-actions button { min-width:30px; height:27px; border:1px solid var(--border2); border-radius:7px;
                        background:var(--surface3); color:var(--text); cursor:pointer; }
  .rec-actions button:disabled { opacity:.4; cursor:default; }
  .rec-fields { display:grid; gap:5px; padding:8px 7px; border-top:1px solid var(--border); }
  .rec-fields input, .rec-fields textarea { width:100%; box-sizing:border-box; border:1px solid var(--border2);
    border-radius:6px; background:var(--surface); color:var(--text); padding:5px 7px; font:11px var(--sans); letter-spacing:0; }
  .rec-fields textarea { min-height:42px; max-height:72px; resize:vertical; }
  .rec-risk { display:inline-block; margin-left:6px; padding:1px 6px; border-radius:5px; font-size:9px; }
  .rec-risk.low { color:var(--ok); background:rgba(34,197,94,.1); }
  .rec-risk.medium { color:var(--warn); background:rgba(245,158,11,.1); }
  .rec-risk.high { color:var(--err); background:rgba(239,68,68,.1); }
  .rec-row { padding:7px 8px; border-top:1px solid var(--border); }
  .rec-row b { display:block; font-size:11px; overflow-wrap:anywhere; }
  .rec-row small { color:var(--muted); font-size:10px; }
  .audit-row { display: flex; gap: 8px; align-items: flex-start; padding: 6px 8px; border-radius: 8px; }
  .audit-row + .audit-row { border-top: 1px solid var(--border); }
  .audit-st { flex: 0 0 auto; font-size: 12px; }
  .audit-b { min-width: 0; flex: 1; }
  .audit-tool { font-family: var(--mono); color: var(--brand1); font-size: 11px; }
  .audit-act { color: var(--muted); font-size: 11px; word-break: break-word; }
  .audit-time { color: var(--faint); font-size: 9.5px; }
  .audit-empty { color: var(--faint); padding: 12px; text-align: center; font-size: 11px; }

  /* ── 底部输入 ── */
  footer { flex: 0 0 auto; border-top: 1px solid var(--border); background: rgba(29,30,36,.7);
           backdrop-filter: blur(6px); padding: 9px; }
  .quick-shell { min-width: 0; display: grid; grid-template-columns: 25px minmax(0,1fr) 25px;
                 align-items: center; gap: 4px; margin-bottom: 2px; }
  .quick-modes { height: 28px; display: inline-flex; flex: 0 0 auto; overflow: hidden;
                 border: 1px solid var(--border2); border-radius: 8px; background: var(--surface2); }
  .quick-mode { width: 25px; height: 100%; padding: 0; border: 0; border-right: 1px solid var(--border2);
                display: grid; place-items: center; background: transparent; color: var(--muted); cursor: pointer; }
  .quick-mode:last-child { border-right: 0; }
  .quick-mode:hover { color: var(--text); background: var(--surface3); }
  .quick-mode.active { color: var(--brand1); background: var(--surface3); }
  .quick-mode svg { width: 14px; height: 14px; }
  .quick { display: flex; min-width: 0; overflow-x: auto; overflow-y: hidden; flex-wrap: nowrap;
           align-items: center; gap: 6px; scroll-behavior: smooth; scrollbar-width: none; }
  .quick::-webkit-scrollbar { display: none; }
  .toolbar { scrollbar-width: none; }
  .toolbar::-webkit-scrollbar { display: none; }
  .quick-nav { width: 25px; height: 28px; padding: 0; border: 1px solid var(--border2); border-radius: 8px;
               display: grid; place-items: center; background: var(--surface2); color: var(--muted); cursor: pointer; }
  .quick-nav:hover:not(:disabled) { color: var(--text); border-color: var(--brand2); }
  .quick-nav:disabled { opacity: .22; cursor: default; }
  .quick-nav svg { width: 14px; height: 14px; }
  .quick-shell[data-mode="collapsed"] { display: none; }
  .quick-shell[data-mode="expanded"] { grid-template-columns: minmax(0,1fr); align-items: start; }
  .quick-shell[data-mode="expanded"] .quick-nav { display: none; }
  .quick-shell[data-mode="expanded"] .quick { flex-wrap: wrap; overflow: visible; padding-bottom: 0; }
  .quick button { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted);
                  border-radius: 8px; min-width: max-content; height: 28px; padding: 0 10px; font-size: 11px;
                  line-height: 1; white-space: nowrap; overflow: hidden; flex: 0 0 auto; cursor: pointer;
                  display: inline-flex; align-items: center; justify-content: center; transition: all .14s; }
  .quick button:hover { color: var(--text); border-color: var(--brand2); background: var(--surface3); }
  /* 悬停 2 秒弹出的功能说明气泡 */
  #tip { position: fixed; z-index: 9999; max-width: 280px; background: var(--surface3, #2a2b33);
         border: 1px solid var(--brand2); border-radius: 10px; padding: 9px 11px; font-size: 12px;
         line-height: 1.55; color: var(--text); box-shadow: 0 8px 28px rgba(0,0,0,.45);
         pointer-events: none; opacity: 0; transform: translateY(4px); transition: opacity .12s, transform .12s; }
  #tip.show { opacity: 1; transform: translateY(0); }
  #tip b { color: var(--brand1, #b06bff); }
  .inputrow { display: flex; flex: 0 0 auto; gap: 7px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border2);
              border-radius: 12px; padding: 6px; transition: border-color .15s; }
  .inputrow:focus-within { border-color: var(--brand2); box-shadow: 0 0 0 3px rgba(124,92,255,.12); }
  #input { flex: 1; resize: none; background: transparent; color: var(--text); border: none; outline: none;
           min-width: 0; padding: 5px 6px; font-family: var(--font); font-size: 13px; max-height: 150px; min-height: 30px; line-height: 1.5; }
  #input::placeholder { color: var(--faint); }
  #send, #stop { border: none; border-radius: 9px; padding: 0 14px; height: 36px; cursor: pointer; font-size: 13px; font-weight: 600;
                 display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; flex: 0 0 auto; }
  #send { background: linear-gradient(135deg, var(--brand1), var(--brand2)); color: #fff; box-shadow: 0 3px 12px rgba(124,92,255,.3); }
  #send:disabled { opacity: .45; cursor: default; box-shadow: none; }
  #send svg, #stop svg { width: 14px; height: 14px; }
  #stop { background: #4a2326; color: #ffd5d5; border: 1px solid #6e3338; display: none; }

  /* ── 工具栏(后端/模型/思考/模式 + 附件/斜杠)── */
  #attachments, .fork-attachments { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  #attachments { flex: 0 0 auto; }
  #attachments:empty, .fork-attachments:empty { display: none; }
  .fork-attachments { margin: 7px 0 0 28px; }
  .att { display: inline-flex; align-items: center; gap: 5px; max-width: 190px; min-width: 0; white-space: nowrap;
         font-size: 11px; color: var(--text);
         background: var(--surface3); border: 1px solid var(--border2); border-radius: 7px; padding: 2px 7px; }
  .att-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .att .x { cursor: pointer; color: var(--faint); }
  .att-clear { flex: 0 0 auto; cursor: pointer; }
  .toolbar { display: flex; flex: 0 0 auto; align-items: center; gap: 6px; margin-bottom: 7px; }
  .tb-spacer { flex: 1; }
  .tbtn { width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--border2); background: var(--surface2);
          color: var(--muted); font-size: 16px; line-height: 1; cursor: pointer; display: grid; place-items: center; }
  .tbtn:hover { color: var(--text); border-color: var(--brand2); }
  /* 插入模式按钮:引导(steer)态醒目橙色,提示会中断当前回答 */
  #tb-insert.steer { color: #f59e0b; border-color: rgba(245,158,11,.5); background: rgba(245,158,11,.12); }
  /* 右侧配置项:统一为一个分段控件容器,同高、无缝、细分隔线 */
  .tb-group { display: inline-flex; align-items: center; height: 30px; background: var(--surface2);
              border: 1px solid var(--border2); border-radius: 9px; overflow: hidden; }
  .tb-group .tb-div { width: 1px; height: 16px; background: var(--border2); flex: 0 0 auto; }
  .tb-group .seg, .tb-group .sel { height: 100%; background: transparent; border: none; color: var(--text);
              font-size: 11.5px; cursor: pointer; display: inline-flex; align-items: center;
              white-space: nowrap; flex: 0 0 auto; }
  .tb-group .seg { padding: 0 10px; gap: 5px; } .tb-group .seg:hover { background: var(--surface3); }
  .tb-group .sel { padding: 0 6px; max-width: 130px; }
  .tb-group .sel:hover { background: var(--surface3); } .tb-group .sel option { background: var(--surface); }
  .model-unavailable { display: none !important; }
  #tb-backend { font-weight: 600; } #tb-mode #mode-label { white-space: nowrap; }
  #tb-fast.on { color: var(--brand1); border-color: var(--brand2); background: var(--surface3); font-weight: 600; }
  #tb-fast.disabled { opacity: .4; pointer-events: none; }
  #tb-backend::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--brand1); }
  @media (max-width: 720px) {
    .toolbar { flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; padding-bottom: 3px; }
    .toolbar .tb-spacer { display: none; }
    .tb-group { order: initial; width: auto; max-width: none; overflow: visible; flex: 0 0 auto; }
    .tb-group .seg, .tb-group .sel { flex: 0 0 auto; }
  }

  .popup { position: absolute; bottom: calc(var(--footer-h, 64px) + 16px); right: 12px; width: 290px; background: var(--surface2);
           border: 1px solid var(--border2); border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.45);
           padding: 7px; z-index: 30; animation: rowIn .16s ease both; }
  .popup.hidden { display: none; }
  .popup.slash { left: 12px; right: auto; width: 320px; max-height: 280px; overflow-y: auto; }
  .pop-title { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--faint);
               padding: 4px 8px 7px; text-transform: uppercase; letter-spacing: .5px; }
  .pop-hint { font-size: 10px; background: var(--surface3); border-radius: 5px; padding: 1px 6px; }
  .pop-item { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; background: none;
              border: none; color: var(--text); padding: 8px; border-radius: 9px; cursor: pointer; }
  .pop-item:hover { background: var(--surface3); }
  .pop-item.active { background: rgba(124,92,255,.1); }
  .pop-item .pi-ic { width: 24px; height: 24px; border-radius: 7px; background: var(--surface3); display: grid;
                     place-items: center; font-size: 13px; flex: 0 0 auto; }
  .pop-item .pi-txt { flex: 1; } .pop-item .pi-txt b { display: block; font-size: 12.5px; }
  .pop-item .pi-txt small { color: var(--muted); font-size: 11px; }
  .pop-item .pi-chk { color: var(--ok); opacity: 0; } .pop-item.active .pi-chk { opacity: 1; }
  .pop-item .pi-cmd { font-family: var(--mono); color: var(--brand1); font-size: 12px; }

  /* ── 顶部 header 内的作者寄语 + 署名(与标题同一行)── */
  header .motto { font-family: var(--mono); font-size: 10.5px; color: var(--muted);
                  flex: 0 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .motto .tk { color: var(--brand2); font-weight: 700; opacity: .85; }
  header .motto em { font-style: normal; font-weight: 700;
                     background: linear-gradient(135deg, var(--brand1), var(--user));
                     -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  header .sig { flex: 0 0 auto; font-size: 11px; font-weight: 700; white-space: nowrap;
                background: linear-gradient(135deg, var(--brand1), var(--user));
                -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body>
  <header>
    <span class="brand" title="MATLAB Copilot · © 林南橘">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.2L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg>
    </span>
    <div id="tabs-list"></div>
    <button id="tab-add" title="新建会话标签页(双击标签可改名)">＋</button>
    <div id="ctx-chip" title="当前上下文(悬停查看详情)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18M3 12h18M3 17h12"/></svg>
      <span id="ctx-count">0</span>
    </div>
    <span class="status" id="statuswrap"><span class="sdot" id="sdot"></span><span id="status">连接中…</span></span>
    <span id="cost-bar" class="cost-bar hidden" title="本次会话累计费用（仅 Claude Code 后端有数据）"></span>
  </header>
  <div id="ctx-pop"></div>
  <div id="panes"></div>
  <footer id="composer">
    <div id="attachments"></div>
    <div class="toolbar">
      <button class="tbtn" id="tb-attach" title="添加本地文件作上下文">＋</button>
      <button class="tbtn" id="tb-slash" title="斜杠命令">/</button>
      <button class="tbtn" id="tb-theme" title="界面主题" data-tip="界面主题:Light 亮色 / Dark 暗色 / 随 MATLAB(跟随 MATLAB 当前明暗主题自动切换)。点击选择。">◑</button>
      <button class="tbtn" id="tb-audit" title="变更记录" data-tip="变更记录(可追溯):列出本会话所有破坏性操作(改模型/跑代码/跑测试)的留痕——时间、工具、改了什么、成功与否。同时按天写入 ~/.matlab-copilot/audit-*.jsonl 持久存档。">📋</button>
      <button class="tbtn" id="tb-recorder" title="模型变更记录器" data-tip="工程级持续记录器:建立工程文件基线，持续保存模型、数据字典、需求和 MATLAB 文件每次保存前后的快照；AI 模型编辑会直接写入同一时间线。">●</button>
      <button class="tbtn" id="tb-mbse" title="MBSE 工程流程" data-tip="MBSE 工程流程:按 R/F/L/P/V 管理需求、功能、逻辑、物理和验证阶段；每阶段均需提案、人工批准、真实构建和确认。">◇</button>
      <button class="tbtn" id="tb-export" title="导出当前对话为 Markdown 文件">⬇</button>
      <button class="tbtn" id="tb-insert" data-tip="回答中插入新需求的处理方式:【⏳ 队列】= 排队,等当前回答结束再自动发出;【⚡ 引导】= 立即中断当前回答,改按新输入回复。点击切换。(回答中按 Esc 可随时中断)">⏳</button>
      <div class="quick-modes" role="group" aria-label="快捷功能显示方式">
        <button class="quick-mode" id="quick-mode-collapsed" type="button" data-quick-mode="collapsed" title="隐藏快捷功能" data-tip="完全隐藏快捷功能按钮，只保留上方配置工具栏和输入框。">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8h14M8 12h8M11 16h2"/></svg>
        </button>
        <button class="quick-mode active" id="quick-mode-single" type="button" data-quick-mode="single" title="单行显示快捷功能" data-tip="快捷功能保持一行；鼠标滚轮或左右箭头可浏览后续按钮。">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h16M4 12h16M4 16h16"/></svg>
        </button>
        <button class="quick-mode" id="quick-mode-expanded" type="button" data-quick-mode="expanded" title="展开全部快捷功能" data-tip="完整显示所有快捷功能，空间不足时自动换成多行。">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h7M13 6h7M4 12h7M13 12h7M4 18h7M13 18h7"/></svg>
        </button>
      </div>
      <span class="tb-spacer"></span>
      <div class="tb-group">
        <button class="seg" id="tb-backend" title="切换后端 Claude/Codex">Claude Code</button>
        <span class="tb-div model-unavailable" id="tb-model-div"></span>
        <select class="sel model-unavailable" id="tb-model" title="模型"></select>
        <span class="tb-div"></span>
        <select class="sel" id="tb-effort" title="思考强度">
          <option value="low">思考·低</option>
          <option value="medium" selected>思考·中</option>
          <option value="high">思考·高</option>
        </select>
        <span class="tb-div"></span>
        <button class="seg mode" id="tb-mode" title="编辑模式"><span id="mode-label">✋ Ask before edits</span> ▾</button>
        <span class="tb-div"></span>
        <button class="seg" id="tb-fast" title="常驻后端:进程常驻,消除每轮冷启延迟(仅 Claude Code 后端;切换后下一轮生效)">⚡ 常驻</button>
      </div>
    </div>
    <div class="quick-shell" id="quick-shell" data-mode="single">
      <button class="quick-nav" id="quick-prev" type="button" title="向左浏览快捷功能" aria-label="向左浏览快捷功能">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div class="quick" tabindex="0" aria-label="快捷功能">
      <button id="btn-diagnose" data-tip="诊断报错：抓取 MATLAB/Simulink 最近一次报错 + 当前上下文(文件/模型/选中),让 Copilot 分析根本原因并给出修复步骤。直接点即可,无需在输入框打字。">🩺 诊断报错</button>
      <button id="btn-explain" data-tip="解释选中(通用):解释你在编辑器里选中的 MATLAB 代码,或在 Simulink 里选中的 block;若什么都没选,则解释当前文件/模型的整体功能。看代码或快速了解整体时用它。">📖 解释选中</button>
      <button id="btn-comment" data-tip="加注释:给编辑器里选中的 MATLAB 代码添加清晰的中文注释,保持逻辑和缩进不变,只返回加注释后的代码,方便你直接替换。">💬 加注释</button>
      <button id="btn-test" data-tip="生成测试:为当前文件/选中代码或当前模型生成测试用例(MATLAB functiontests 或 Simulink Test),覆盖正常、边界、异常情况,并说明如何运行。">🧪 生成测试</button>
      <button id="btn-check" data-tip="标准检查:对当前 Simulink 模型运行建模标准检查(Simulink Check / model_check),按严重程度汇总问题并给出修复建议。">✔ 标准检查</button>
      <button id="btn-find" data-tip="查找模块:先在下方输入框描述你要找的模块(如『求和模块』『计算车速的增益』),再点此。Copilot 会在当前模型里语义定位最匹配的模块,在画布上橙色高亮并解释。">🔍 查找模块</button>
      <button id="btn-explainblk" data-tip="解释模块(Simulink 深度):先在画布上选中一个或多个 block,再点此。Copilot 用 model_read 读取它们的真实参数,逐个精准说明作用、关键参数取值、输入输出与上下游连接、在模型里的角色。">🧩 解释模块</button>
      <button id="btn-doc" data-tip="查文档:在下方输入框写函数/功能/报错(如『pid 控制器怎么用』『lsim』),再点此。Copilot 会抓取 MathWorks 官方文档页核实后作答,答案锚定真实文档内容并给出已验证的可点击链接,杜绝编造 API。">📖 查文档</button>
      <button id="btn-tasks" data-tip="任务流(对标 Process Advisor):对当前模型按预定义管线逐阶段跑——编译/结构化诊断 → 标准检查 → Simulink Test → 汇总报告。自动探测本机能力(有 Process Advisor 付费件就用真的,没有就用等价管线兜底)。">⚙ 任务流</button>
      <button id="btn-heal" data-tip="自愈运行:运行当前代码/模型验证,若报错则自动分析根因、修复、重新运行,最多迭代 3 次直到通过。每轮用「[验证 N/3]」标注进度,第 3 次仍失败会列出问题请你决策。">🔄 自愈运行</button>
      <button id="btn-req" data-tip="需求追溯:梳理当前模型/代码的功能并生成需求条目草稿(ID/描述/来源/验证方法),标注每条需求对应的 block 路径,实现双向可追溯。有 Requirements Toolbox 时尝试读取已有需求并建立链接。输出 Markdown 表格可导入 ReqIF/Excel。">📋 需求追溯</button>
      <button id="btn-codegen" data-tip="代码评审:对当前 MATLAB 文件或 Simulink 模型的生成代码做静态分析——函数复杂度、MISRA-C 风险(类型转换/溢出/除零)、向量化机会；有 Embedded Coder 时汇总代码规模与 RAM/ROM 估算。">🔬 代码评审</button>
      <button id="btn-batch" data-tip="批量编辑:先在下方输入框用自然语言描述要批改的内容(如『给所有 Outport 加日志』『把所有 Sum 模块标红』『统一某子系统采样时间为 0.01』),再点此。Copilot 会在模型里定位所有目标 block,逐个 model_edit 批改——每处改动仍会弹确认,可逐个核对 diff。">🪄 批量编辑</button>
      <button id="btn-testflow" data-tip="测试编排:一键跑完整测试闭环——生成测试用例 → 运行 → 汇总结果(通过/失败/覆盖率)。MATLAB 文件用 functiontests/runtests;Simulink 模型用 Simulink Test/model_test。运行测试会弹确认。区别于『生成测试』(只产代码不跑)。">🧪▶ 测试编排</button>
      <button id="btn-capture" data-tip="截图分析:把当前 Simulink 模型画布导出为 PNG,发给 Copilot 用视觉能力分析——信号流结构、命名规范、未连接端口、可疑参数、布局可读性,并给出改进建议。需先在 MATLAB 里打开一个 Simulink 模型。">📸 截图分析</button>
      <button id="btn-cursor" data-tip="生成到光标:在下方输入框写要生成的内容,点此让 Copilot 把生成的代码直接插入 MATLAB 编辑器当前光标处(兼容实时脚本 Live Editor)。">↳ 生成到光标</button>
      <button id="btn-refresh" data-tip="刷新上下文:手动重新读取并刷新顶栏显示的当前文件/模型/选中 block/工作区变量/最近报错状态。切换了模型或选择后想让顶栏立刻更新时用它。">⟳ 刷新上下文</button>
      <button id="btn-clear" data-tip="清屏:清空当前聊天记录的显示(不影响后端会话历史,也不会改动你的文件或模型)。">🗑 清屏</button>
      </div>
      <button class="quick-nav" id="quick-next" type="button" title="向右浏览更多快捷功能" aria-label="向右浏览更多快捷功能">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
    <div id="notes-area" class="notes-area"></div>
    <div class="inputrow">
      <textarea id="input" placeholder="问点什么… (Enter 发送，Shift+Enter 换行，/ 斜杠命令，Ctrl+K 命令面板)"></textarea>
      <button id="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>发送</button>
      <button id="stop"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>停止</button>
    </div>
    <div id="modes-pop" class="popup hidden">
      <div class="pop-title">编辑模式<span class="pop-hint">⇧ + Tab 切换</span></div>

const tabs = {};            // convId -> tab

function rememberClosedConv(convId) {

let activeConv = 'main';
let tabSeq = 1;

let projectChanges = [];
let recorderDraft = null;
let mbseState = { initialized: false, currentPhase: 'R', phases: [], capabilities: {} };

const WELCOME_HTML = '<div class="welcome"><div class="w-logo">✦</div><div class="w-title">MATLAB Copilot</div>' +

function clearWelcome() { if (messages) { const w = messages.querySelector('.welcome'); if (w) w.remove(); } }

// ── 会话落盘持久化 + 按项目恢复 ────────────────────────────────────────────────
// 只持久化「用户消息 + 助手最终回答」两类核心内容(渲染后的 HTML),不存 tool/thinking 卡片。
// 按项目(cwd/工程根)分 key;预览模式用 'default'。恢复纯展示——后端上下文已随重启重置。
let projectKey = null, restoring = false, saveTimer = null;
function sessionStoreKey() { return 'mc-session-' + (projectKey || 'default'); }
function curRenderTab() { return messages ? tabs[messages.dataset.conv] : null; }
function recordHist(role, html, raw) {
  if (restoring) return;                  // 恢复重建期间不重复记录
  const t = curRenderTab();
  if (!t || t.isFork) return;             // fork 子会话的 pane 不在 tabs 里 → 自动跳过
  // assistant 额外存原始 markdown(raw),供导出时保留结构;user 只存渲染后 html。
  t.history.push(raw !== undefined ? { role, html, raw } : { role, html });
  scheduleSave();
}
function scheduleSave() {
  if (projectKey === null) return;        // 未确定项目前不存(避免存到错的 key 再迁移)
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveSession, 600);
}
const HISTORY_CAP = 400;   // 每个标签页最多持久化的消息条数(保留最近的,防止无限增长撑爆 localStorage)
function saveSession() {
  if (projectKey === null) return;   // 未确定项目前不存(beforeunload/清屏等直接调用时的兜底)
  try {
    let tabsData = Object.values(tabs).filter((t) => !t.isFork && t.history.length)
      .map((t) => ({ convId: t.convId, name: t.name,
        history: t.history.length > HISTORY_CAP ? t.history.slice(-HISTORY_CAP) : t.history }));
    if (!tabsData.length) { localStorage.removeItem(sessionStoreKey()); return; }
    // 超额(QuotaExceeded)时逐轮裁掉每 tab 最旧的一半再重试,避免大会话整存失败。
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        localStorage.setItem(sessionStoreKey(), JSON.stringify({ savedAt: Date.now(), activeConv, tabs: tabsData }));
        return;
      } catch (e) {
        tabsData = tabsData.map((t) => ({ ...t, history: t.history.slice(-Math.ceil(t.history.length / 2)) }))
          .filter((t) => t.history.length);
        if (!tabsData.length) { setStatus('历史过大，本次未能保存'); return; }
      }
    }
    setStatus('历史过大，仅保存了部分会话记录');   // 4 轮裁剪后仍超额:不再静默丢数据
  } catch (e) {}
}
function normalizedProjectKey(ctx) {
  const root = ctx && ctx.projectInfo && ctx.projectInfo.root;
  const value = root ? String(root).trim().replace(/\\/g, '/').replace(/\/+$/, '') : 'default';
  return /^[A-Za-z]:\//.test(value) ? value.toLowerCase() : value;
}
function resetTabsForProjectChange() {
  const previousConfig = activeTab() ? Object.assign({}, activeTab().config) : null;
  for (const t of Object.values(tabs)) {
    cancelErrorFinish(t.convId);
    rememberClosedConv(t.convId);
    toMatlab('close_conv', { convId: t.convId });

// 上下文中的工程根发生变化时，先落盘旧工程，再重建后端会话并恢复新工程历史。
function ensureProjectKey(ctx) {
  const nextKey = normalizedProjectKey(ctx);
  if (projectKey === null) {
    projectKey = nextKey;
    restoreSession();
    return false;
  }
  if (projectKey === nextKey) return false;
  clearTimeout(saveTimer);
  saveSession();
  resetTabsForProjectChange();
  projectKey = nextKey;
  restoreSession();
  if (!tabs[activeConv]) switchTab('main');
  setStatus('工程已切换，会话上下文已隔离');
  return true;
}
function restoreSession() {
  let data;
  try { data = JSON.parse(localStorage.getItem(sessionStoreKey()) || 'null'); } catch (e) {}
  if (!data || !Array.isArray(data.tabs) || !data.tabs.length) return;
  restoring = true;
  try {
    data.tabs.forEach((sav, i) => {
      // 推进 tabSeq 越过已恢复的编号,否则后续 newTab 生成 t2/t3 会撞键覆盖恢复出的标签。
      const n = parseInt(String(sav.convId).replace(/^t/, ''), 10);
      if (Number.isFinite(n) && n > tabSeq) tabSeq = n;
      const t = getTab(sav.convId);       // main 已存在,其余新建
      t.name = sav.name || t.name;
      useRender(t.convId);
      const w = t.pane.querySelector('.welcome'); if (w) w.remove();
      addRestoreDivider();
      // assistant 用原始 markdown 重渲染(保留 raw 供导出);user 用存好的 html。兼容旧数据。
      for (const m of (sav.history || [])) {
        if (m.role === 'assistant' && m.raw !== undefined) {
          const el = addRow('assistant', renderMd(m.raw));
          attachBubbleActions(el, m.raw);   // 恢复的历史气泡也挂 复制/批注/Fork
        } else {
          addRow(m.role, m.html || '');
        }
      }
      t.history = (sav.history || []).slice();
    });
    if (data.activeConv && tabs[data.activeConv]) switchTab(data.activeConv);
    renderTabs();
    setStatus('已恢复上次会话历史');
  } catch (e) {}
  restoring = false;
}
function addRestoreDivider() {
  const div = document.createElement('div');
  div.className = 'restore-divider';
  div.textContent = '⤴ 历史记录（后端上下文已重置，可继续提问）';
  messages.appendChild(div);
}

function setStatus(t) { $('status').textContent = t; }
function scrollDown() { if (messages) messages.scrollTop = messages.scrollHeight; }
function escapeHtml(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function escapeAttr(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function safeHttpHref(value) {
  const decoded = String(value).replace(/&amp;/g, '&');
  try {
    const url = new URL(decoded);
    if (url.protocol !== 'http:' && url.protocol !== 'https:') return '#';
    return escapeAttr(url.href);
  } catch (e) { return '#'; }
}

// ── 轻量 Markdown 渲染器(自包含、无 CDN、流式安全)──────────────────────────
const Z0 = String.fromCharCode(0xE000), Z1 = String.fromCharCode(0xE001);
const RE_BLOCK = new RegExp('^' + Z0 + '(\\d+)' + Z0 + '$');
const RE_CODE = new RegExp(Z1 + '(\\d+)' + Z1, 'g');

function mdInline(escaped) {
  let out = escaped;
  const codes = [];
  out = out.replace(/`([^`\n]+)`/g, (m, c) => { codes.push(c); return Z1 + (codes.length - 1) + Z1; });
  out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m, t, u) => '<a href="' + safeHttpHref(u) + '" target="_blank" rel="noopener noreferrer">' + t + '</a>');
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/__([^_]+)__/g, '<strong>$1</strong>');
  out = out.replace(/~~([^~]+)~~/g, '<del>$1</del>');
  out = out.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  out = out.replace(/(^|[^_\w])_([^_\n]+)_/g, '$1<em>$2</em>');
  out = out.replace(/(^|[^"=>\w])(https?:\/\/[^\s<]+)/g, (m, pre, u) => pre + '<a href="' + safeHttpHref(u) + '" target="_blank" rel="noopener noreferrer">' + u + '</a>');
  out = out.replace(RE_CODE, (m, i) => '<code>' + codes[+i] + '</code>');
  return out;
}
function codeBlock(lang, code) {
  const head = '<div class="cb-head"><span class="dotrow"><i style="background:#ff5f57"></i><i style="background:#febc2e"></i><i style="background:#28c840"></i></span>' + escapeHtml(lang || 'code') + '</div>';
  return '<div class="codeblock">' + head + '<pre class="code">' + escapeHtml(code.replace(/\n$/, '')) + '</pre></div>';
}
function renderMd(text) {
  // 剥掉「查找模块」用的高亮标记 <<HILITE: 路径>>(面板用它原生高亮,用户不可见)。
  text = String(text).replace(/<<HILITE:[\s\S]*?>>/g, '');
  const blocks = [];
  const stash = (lang, code) => { blocks.push(codeBlock(lang, code)); return '\n' + Z0 + (blocks.length - 1) + Z0 + '\n'; };
  let s = String(text).replace(/```[ \t]*([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g, (m, lang, code) => stash(lang, code));
  s = s.replace(/```[ \t]*([a-zA-Z0-9_+-]*)\n?([\s\S]*)$/, (m, lang, code) => stash(lang, code));
  const lines = s.split('\n');
  let html = '', para = [], listType = null, items = [], quote = [], table = [];
  const fp = () => { if (para.length) { html += '<p>' + para.map((l) => mdInline(escapeHtml(l))).join('<br>') + '</p>'; para = []; } };
  const fl = () => {
    if (!items.length) return;
    if (listType === 'todo') {
      html += '<ul class="todo-list">' + items.map((it) => {
        const chk = it.checked;
        return '<li class="todo-item"><label>' +
          '<input type="checkbox"' + (chk ? ' checked' : '') + ' class="todo-cb">' +
          '<span class="' + (chk ? 'todo-done' : '') + '">' + mdInline(escapeHtml(it.text)) + '</span></label></li>';
      }).join('') + '</ul>';
    } else {
      html += '<' + listType + '>' + items.map((it) =>
        '<li>' + mdInline(escapeHtml(typeof it === 'object' ? it.text : it)) + '</li>'
      ).join('') + '</' + listType + '>';
    }
    items = []; listType = null;
  };
  const fq = () => { if (quote.length) { html += '<blockquote>' + quote.map((l) => mdInline(escapeHtml(l))).join('<br>') + '</blockquote>'; quote = []; } };
  const ft = () => {
    if (!table.length) return;
    const cells = (r) => r.replace(/^\||\|$/g, '').split('|').map((c) => c.trim());
    let t = '<table>';
    table.forEach((row, i) => { if (i === 1 && /^\s*\|?[ :|-]+\|?\s*$/.test(row)) return; const tag = i === 0 ? 'th' : 'td'; t += '<tr>' + cells(row).map((c) => '<' + tag + '>' + mdInline(escapeHtml(c)) + '</' + tag + '>').join('') + '</tr>'; });
    html += t + '</table>'; table = [];
  };
  const fa = () => { fp(); fl(); fq(); ft(); };
  for (const line of lines) {
    let m;
    if (m = line.match(RE_BLOCK)) { fa(); html += blocks[+m[1]]; continue; }
    if (/^\s*$/.test(line)) { fa(); continue; }
    if (/^\s*\|.*\|\s*$/.test(line)) { fp(); fl(); fq(); table.push(line); continue; }
    ft();
    if (m = line.match(/^(#{1,6})\s+(.*)$/)) { fa(); const n = m[1].length; html += '<h' + n + '>' + mdInline(escapeHtml(m[2])) + '</h' + n + '>'; continue; }
    if (/^\s*(---|\*\*\*|___)\s*$/.test(line)) { fa(); html += '<hr>'; continue; }
    if (m = line.match(/^>\s?(.*)$/)) { fp(); fl(); quote.push(m[1]); continue; }
    if (m = line.match(/^\s*[-*+]\s+\[([ xX])\]\s+(.*)$/)) { fp(); fq(); if (listType !== 'todo') { fl(); listType = 'todo'; } items.push({checked: m[1].toLowerCase() === 'x', text: m[2]}); continue; }
    if (m = line.match(/^\s*[-*+]\s+(.*)$/)) { fp(); fq(); if (listType !== 'ul') { fl(); listType = 'ul'; } items.push(m[1]); continue; }
    if (m = line.match(/^\s*\d+\.\s+(.*)$/)) { fp(); fq(); if (listType !== 'ol') { fl(); listType = 'ol'; } items.push(m[1]); continue; }
    fl(); fq(); para.push(line);
  }
  fa();
  return html;
}
function renderPlain(text) { return mdInline(escapeHtml(String(text))).replace(/\n/g, '<br>'); }

// ── 消息构建(头像 + 气泡)──────────────────────────────────────────────────
function addRow(role, html) {
  clearWelcome();
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.innerHTML = role === 'user' ? ICON.user : ICON.agent;
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.innerHTML = html;
  if (role === 'user') { row.appendChild(bubble); row.appendChild(avatar); }
  else { row.appendChild(avatar); row.appendChild(bubble); }
  messages.appendChild(row);
  if (role === 'user') recordHist('user', html);   // 用户消息(含按钮动作)落历史
  scrollDown();
  scheduleNavRail();   // 轮次/高度变化 → 刷新导航轨
  return bubble; // 内容容器
}
function addMsg(cls, html) {
  if (cls === 'error') {
    clearWelcome();
    const el = document.createElement('div');
    el.className = 'banner error';
    el.innerHTML = ICON.err + '<div>' + html + '</div>';
    messages.appendChild(el); scrollDown(); return el;
  }
  return addRow(cls, html);
}

// 复制文本:优先让 MATLAB 用 clipboard('copy') 复制(webview 剪贴板常受限),回退浏览器 API。
function copyText(text) {
  if (MC) { toMatlab('copy_text', { text: String(text) }); setStatus('已复制'); return; }
  try { navigator.clipboard.writeText(String(text)); setStatus('已复制'); } catch (e) { setStatus('复制失败'); }
}
// 给一个输入框绑「粘贴图片(截图)→ base64 → attach_image」(主输入框和 Fork 输入框共用)。
function bindImagePaste(el, convId) {
  el.addEventListener('paste', (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || [];
    for (const it of items) {
      if (it.type && it.type.indexOf('image') === 0) {
        const blob = it.getAsFile();
        if (blob) {
          e.preventDefault();
          const reader = new FileReader();
          reader.onload = () => {
            const ext = (it.type.split('/')[1] || 'png').replace('jpeg', 'jpg');
            const cid = typeof convId === 'function' ? convId() : (convId || activeConv);
            toMatlab('attach_image', { name: '粘贴图片.' + ext, dataUrl: String(reader.result), convId: cid });
            setStatus('已粘贴图片,发送时一并带上');
          };
          reader.readAsDataURL(blob);
        }
        return;
      }
    }
  });
}
// 给一个气泡挂操作按钮行(buttons: [{label,cls,on}])。
function attachActions(bubble, buttons) {
  const bar = document.createElement('div');
  bar.className = 'msg-actions';
  buttons.forEach((b) => {
    const el = document.createElement('button');
    el.className = 'ma-btn' + (b.cls ? ' ' + b.cls : '');
    el.innerHTML = b.label;
    el.onclick = b.on;
    bar.appendChild(el);
  });
  bubble.appendChild(bar);
  return bar;
}
// 用户消息(带「✎ 编辑」:撤回此条及其后所有消息,把原文回填输入框重发)。
function addUserMessage(text) {
  const bubble = addRow('user', renderPlain(text));
  attachActions(bubble, [{ label: '✎ 编辑', on: () => resetToEdit(bubble.parentNode, text) }]);
  return bubble;
}
function resetToEdit(row, text) {
  useRender(activeConv);
  toMatlab('interrupt', {}); setBusy(false, activeConv);
  const t = activeTab();
  const historyRows = Array.from(messages.querySelectorAll('.row.user, .row.assistant'));
  const historyIndex = historyRows.indexOf(row);
  if (t && historyIndex >= 0) {
    t.history = t.history.slice(0, historyIndex);
    scheduleSave();
  }
  // 删掉此条及其后的所有消息行(在当前活动标签的 pane 内)。
  while (row && row.nextSibling) {
    const victim = row.nextSibling;
    disposeForksWithin(victim);
    messages.removeChild(victim);
  }
  if (row) { disposeForksWithin(row); messages.removeChild(row); }
  const inp = $('input');
  inp.value = text; inp.focus();
  inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 150) + 'px';
  setStatus('已撤回，改完再发送');
  scheduleNavRail();   // 撤回删行后刷新导航轨,避免残留悬空刻度
}
// 给任意 assistant 气泡 el 挂「⧉ 复制 / ✚ 批注 / ⑂ Fork」(raw 用于复制/Fork 种子);幂等。
// 抽成独立函数,让流式回答与「会话恢复重建的历史气泡」两条路径都能挂——
// 否则恢复出的历史气泡没有这些操作,显得「只有最新气泡才能用」。
function attachBubbleActions(el, raw) {
  if (!el || el.querySelector('.msg-actions')) return;
  attachActions(el, [
    { label: '⧉ 复制', cls: 'act-copy', on: () => copyText(raw) },
    { label: '✚ 批注', cls: 'act-annot', on: () => annotateFromBubble(el) },
    { label: '⑂ Fork', cls: 'act-fork', on: () => startFork({ el, raw }) },
    { label: '📌 存经验', cls: 'act-kb', on: () => kbSaveFromBubble(el, raw) },
  ]);
}
// 把这条回答连同它对应的用户提问,沉淀进团队经验库(.copilot_kb/,可进 git 共享)。
function kbSaveFromBubble(el, raw) {
  let q = '';
  for (let row = el.parentNode; row; row = row.previousElementSibling) {   // 往前找最近的用户行
    if (row.classList && row.classList.contains('row') && row.classList.contains('user')) { q = navRowText(row); break; }
  }
  toMatlab('kb_save', { q: navClip(q || '(未记录提问)', 200), a: String(raw || '').slice(0, 6000) });
}
// 流式路径:assistant_stop 时按 id 从 bubbles 反查并挂。
function addBubbleActions(id) {
  const b = bubbles[id];
  if (b) attachBubbleActions(b.el, b.raw);
}

// ── 选区批注 → 汇总进输入框 ─────────────────────────────────────────────────
// 看完长回答后,在气泡里【选中有疑问的文字 → 右键】弹批注框(也可点「✚ 批注」),
// 输入针对这段的问题 → 追加到下方输入框。可连续标注多段、汇总成一条,审阅/编辑后一次发送。
// 位置感知:每条批注都带「针对『选中文字』」锚点,AI 知道问题针对哪段。

// 一条批注 = 一张便签,贴在输入框上方;发送时与输入框文字合并成一条消息(见 sendMessage)。
// 便签是 per-tab 的(activeTab().pendingNotes),避免多标签切换时串台;mark 元素在该 tab 的 pane 内。
function curNotes() { const t = activeTab(); if (!t) return []; if (!t.pendingNotes) t.pendingNotes = []; return t.pendingNotes; }

function addNote(snippet, question, mark) {
  const ns = curNotes();
  ns.push({ snippet, question, mark: mark || null });
  renderNotesArea();
  setStatus('已贴便签（' + ns.length + '），写完点发送一起问');
}

function renderNotesArea() {
  const area = $('notes-area'); area.innerHTML = '';
  const ns = curNotes();
  ns.forEach((n) => {
    const note = document.createElement('div'); note.className = 'sticky-note';
    if (n.snippet) { const a = document.createElement('div'); a.className = 'sn-anchor'; a.textContent = '📌 ' + n.snippet; a.title = n.snippet; note.appendChild(a); }
    const q = document.createElement('div'); q.className = 'sn-q'; q.textContent = n.question; note.appendChild(q);
    const x = document.createElement('span'); x.className = 'sn-x'; x.textContent = '✕'; x.title = '删除这条批注';
    x.onclick = () => {                                  // 按对象引用删除(不用闭包索引,避免重渲染错位)
      unwrapMark(n.mark);                                // 同时撤销高亮
      const arr = curNotes(); const k = arr.indexOf(n); if (k >= 0) arr.splice(k, 1);
      renderNotesArea();
    };
    note.appendChild(x); area.appendChild(note);
  });
}

// 解除一段高亮(把 <mark> 内容摊回原位)。删便签时用。
function unwrapMark(mark) {
  if (!mark || !mark.parentNode) return;
  const p = mark.parentNode;
  while (mark.firstChild) p.insertBefore(mark.firstChild, mark);
  p.removeChild(mark); if (p.normalize) p.normalize();
}

// 把一个 Range 包裹成黄色高亮 <mark>,持久标识「这段被批注过」,返回该 mark 元素(无法安全高亮时返回 null)。
// 选区在右键那一刻就 cloneRange 保存好,到这里 DOM 未变、Range 仍有效。
function highlightRange(range) {
  if (!range) return null;
  try {
    // 选区已落在已有高亮里 → 复用,不重复包裹(避免嵌套 <mark>)。
    const anc = range.commonAncestorContainer;
    const ancEl = anc.nodeType === 1 ? anc : anc.parentElement;
    const existing = ancEl && ancEl.closest && ancEl.closest('mark.annot-mark');
    if (existing) { const sel = window.getSelection(); if (sel) sel.removeAllRanges(); return existing; }
    // 只用 surroundContents(单文本节点内选区);跨节点/跨块(代码块/列表/多段)会抛错 →
    // 放弃高亮(返回 null),不用 extractContents 兜底(那会破坏 DOM 结构、产生不平衡标签)。便签仍生效。
    const mark = document.createElement('mark'); mark.className = 'annot-mark';
    try { range.surroundContents(mark); }
    catch (e) { return null; }
    const sel = window.getSelection(); if (sel) sel.removeAllRanges();
    return mark;
  } catch (e) { return null; }
}

// 在 (x,y) 处弹浮动批注框,确认后:汇总进输入框 + 高亮被批注的文字段。
function openAnnotatePopup(x, y, snippet, range) {
  const pop = $('annotate-pop'); pop.innerHTML = '';
  if (snippet) { const s = document.createElement('div'); s.className = 'ap-snippet'; s.textContent = '针对：「' + snippet + '」'; pop.appendChild(s); }
  const ta = document.createElement('textarea'); ta.className = 'ap-input'; ta.rows = 2;
  ta.placeholder = '对这段的疑问…（Enter 加入输入框，Esc 取消）';
  const row = document.createElement('div'); row.className = 'ap-row';
  const cancel = document.createElement('button'); cancel.className = 'fi-btn'; cancel.textContent = '取消';
  const ok = document.createElement('button'); ok.className = 'fi-btn primary'; ok.textContent = '✓ 加入输入框';
  row.appendChild(cancel); row.appendChild(ok);
  pop.appendChild(ta); pop.appendChild(row);
  pop.classList.remove('hidden');
  const w = pop.offsetWidth || 290, h = pop.offsetHeight || 130;
  pop.style.left = Math.max(8, Math.min(x, window.innerWidth - w - 12)) + 'px';
  pop.style.top  = Math.max(8, Math.min(y, window.innerHeight - h - 12)) + 'px';
  ta.focus();
  const commit = () => { const q = ta.value.trim(); if (q) { const mark = highlightRange(range); addNote(snippet, q, mark); } closeAnnotatePopup(); };
  ok.onclick = commit; cancel.onclick = closeAnnotatePopup;
  ta.addEventListener('keydown', (e) => {
    e.stopPropagation();   // 别触发全局输入框快捷键
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); closeAnnotatePopup(); }
  });
}
function closeAnnotatePopup() { const p = $('annotate-pop'); p.classList.add('hidden'); p.innerHTML = ''; }

// 取气泡内的文字选区,返回 { snippet, range }(无有效选区返回 null)。range 已 clone,可跨 DOM 变更使用。
function selectionRangeIn(bubbleEl) {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) return null;
  const r = sel.getRangeAt(0);
  if (!bubbleEl.contains(r.commonAncestorContainer)) return null;
  const snippet = sel.toString().trim().replace(/\s+/g, ' ').slice(0, 80);
  if (!snippet) return null;
  return { snippet, range: r.cloneRange() };
}

// 「✚ 批注」按钮:有选区用选区作锚点并高亮,无选区则针对整条(锚点用气泡开头摘要,不高亮)。
function annotateFromBubble(bubbleEl) {
  if (bubbleEl.classList.contains('streaming')) { setStatus('回答还在生成中，结束后再批注'); return; }   // 流式中 DOM 在变,Range 会失效
  if (bubbleEl.closest('.fork-zone')) { setStatus('分支讨论内暂不支持批注（批注会发到主会话，上下文对不上）'); return; }
  const picked = selectionRangeIn(bubbleEl);
  const snippet = picked ? picked.snippet : (bubbleEl.textContent || '').trim().replace(/\s+/g, ' ').slice(0, 40);
  const rect = bubbleEl.getBoundingClientRect();
  openAnnotatePopup(rect.left + 24, Math.min(rect.bottom - 30, window.innerHeight - 160), snippet, picked && picked.range);
}

// Fork:在该卡片内开一条「以本卡片内容为种子」的独立子会话,回答嵌在卡片里。
let forkSeq = 0;
function makeForkState(convId, paneEl) {
  closedConvs.delete(convId);
  const t = { convId, name: convId, pane: paneEl, bubbles: {}, thinks: {}, busy: false,
              config: Object.assign({}, activeTab() ? activeTab().config : {}), auditLog: [], isFork: true, sendBtn: null, queue: [], pendingNotes: [],
              context: null, contextKey: '', attachments: [] };
  tabs[convId] = t;
  return t;
}
function closeFork(convId, zone) {
  if (!convId) return;
  const t = tabs[convId];
  const holder = zone || (t && t.pane && t.pane.closest('.fork-zone'));
  cancelErrorFinish(convId);
  if (!closedConvs.has(convId)) {
    rememberClosedConv(convId);
    toMatlab('close_conv', { convId });
  }
  delete tabs[convId];
  if (holder) holder.remove();
}
function disposeForksWithin(root) {
  if (!root || !root.querySelectorAll) return;
  const zones = [...root.querySelectorAll('.fork-zone[data-conv]')];
  if (root.matches && root.matches('.fork-zone[data-conv]')) zones.unshift(root);
  zones.forEach((zone) => closeFork(zone.dataset.conv, zone));
}
function startFork(parent) {
  if (!parent || !parent.el || parent.el.querySelector('.fork-zone')) return;  // 每卡片一个分支区
  const parentRaw = parent.raw;
  const convId = 'fork-' + (++forkSeq);
  const zone = document.createElement('div');
  zone.className = 'fork-zone';
  zone.dataset.conv = convId;
  zone.innerHTML = '<div class="fork-head"><span>⑂ 分支讨论(基于本回答,独立上下文)</span><button class="fork-close" title="关闭分支">×</button></div><div class="fork-msgs"></div>' +
    '<div class="fork-attachments"></div>' +
    '<div class="fork-input-row"><textarea class="fork-input" rows="1" placeholder="基于这条回答继续提需求…(Enter 发送)"></textarea><button class="fork-send">发送</button></div>';
  parent.el.appendChild(zone);
  const fs = makeForkState(convId, zone.querySelector('.fork-msgs'));
  const inp = zone.querySelector('.fork-input');
  const btn = zone.querySelector('.fork-send');
  fs.sendBtn = btn;
  zone.querySelector('.fork-close').onclick = () => disposeForksWithin(zone);
  let seeded = false;
  const doSend = () => {
    const text = inp.value.trim();
    if (fs.busy) return;
    if (!text && !attachmentCount(convId)) return;        // 无文本也无该分支附件才拦(支持只发图)
    inp.value = ''; inp.style.height = 'auto';
    useRender(convId);
    addMsg('user', renderPlain(text || '（见附件）'));   // 分支里的用户气泡
    setBusy(true, convId);
    const body = text || '请查看我附加的图片/文件。';
    const payload = seeded ? body
      : ('以下是你之前的一个回答,我要基于它继续/扩展讨论:\n\n' + parentRaw + '\n\n我的新需求:' + body);
    seeded = true;
    toMatlab('user_message', { id: nextId(), text: payload, convId });
  };
  btn.onclick = doSend;
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  inp.addEventListener('input', (e) => { const t = e.target; t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 80) + 'px'; });
  bindImagePaste(inp, convId);   // Fork 图片固定归属该分支，不进入父标签附件
  inp.focus(); scrollDown();
}

function ensureBubble(id) {
  if (bubbles[id]) return bubbles[id];
  const el = addRow('assistant', '');
  el.classList.add('streaming');
  bubbles[id] = { el, raw: '' };
  return bubbles[id];
}

function ensureThink(id) {
  if (thinks[id]) return thinks[id];
  const el = document.createElement('div');
  el.className = 'think thinking';
  el.innerHTML = '<div class="th-head">' + ICON.brain + '<span class="th-label">思考过程</span><span class="th-caret">▾</span></div><div class="th-body"></div>';
  el.querySelector('.th-head').onclick = () => el.classList.toggle('collapsed');
  messages.appendChild(el); scrollDown();
  thinks[id] = { el, body: el.querySelector('.th-body'), label: el.querySelector('.th-label'), raw: '' };
  return thinks[id];
}

// ── 工具/技能分类 ────────────────────────────────────────────────────────────
function classifyTool(name) {
  const n = String(name);
  if (n === 'Skill' || /skill/i.test(n)) return { kind: 'skill', icon: ICON.skill, tag: '技能', label: n.replace(/^mcp__/, '').replace(/__/g, ' · ') };
  if (n.startsWith('mcp__')) return { kind: 'tool', icon: ICON.tool, tag: 'MCP', label: n.replace(/^mcp__/, '').replace(/__/g, ' · ') };
  if (/^(Bash|Shell)$/.test(n)) return { kind: 'bash', icon: ICON.bash, tag: '终端', label: n };
  if (/^(Read|Write|Edit|MultiEdit|Glob|Grep|NotebookEdit)$/.test(n)) return { kind: 'file', icon: ICON.file, tag: '文件', label: n };
  return { kind: 'tool', icon: ICON.tool, tag: '工具', label: n };
}

// ── 处理 sidecar → UI 事件 ──────────────────────────────────────────────────
function onSidecar(msg) {
  if (!msg || !msg.type) return;
  // 全局事件(不属于某个标签页):能力和主题。
  switch (msg.type) {
    case 'ready': setStatus('已就绪'); $('sdot').className = 'sdot live'; return;
    case 'theme': if (themeChoice === 'auto') paintTheme(msg.mode === 'light' ? 'light' : 'dark'); return;
    case 'capabilities': applyCaps(msg); return;
    case 'change_recorder_state': onRecorderState(msg.state); return;
    case 'project_change': onProjectChange(msg.entry); return;
    case 'change_report': onChangeReport(msg.report); return;
    case 'mbse_workflow_state': onMBSEWorkflowState(msg.state, msg.message); return;
  }
  // 标签页相关事件:把渲染指针指向该会话的 pane,状态/busy 只在它是当前活动标签时影响顶栏。
  const cid = msg.convId || 'main';
  if (closedConvs.has(cid)) return;
  useRender(cid);
  const onActive = (cid === activeConv);
  switch (msg.type) {
    case 'context': {
      const t = tabs[cid];
      if (t) {
        t.context = msg.context || {};
        if (onActive && !t.isFork) renderContext(t.context, t);
      }
      break;
    }
    case 'attachments': {
      const t = tabs[cid];
      if (t) {
        t.attachments = toArr(msg.files).map(String);
        renderAttachmentsForTab(t);
      }
      break;
    }
    case 'status': if (onActive) setStatus(msg.text === 'thinking' ? '思考中…' : (msg.text || '')); if (msg.text === 'thinking') setBusy(true, cid); break;
    case 'thinking_start': ensureThink(msg.id); if (onActive) setStatus('思考中…'); break;
    case 'thinking_delta': { const t = ensureThink(msg.id); t.raw += msg.text || ''; t.body.innerHTML = renderMd(t.raw); scrollDown(); break; }
    case 'thinking_stop': { const t = thinks[msg.id]; if (t) { t.el.classList.remove('thinking'); t.el.classList.add('collapsed'); t.label.textContent = '思考过程（点击展开）'; } break; }
    case 'assistant_start': { const el = addRow('assistant', ''); el.classList.add('streaming'); bubbles[msg.id] = { el, raw: '' }; break; }
    case 'assistant_delta': { const b = ensureBubble(msg.id); b.raw += msg.text || ''; b.el.innerHTML = renderMd(b.raw); scrollDown(); break; }
    case 'assistant_stop': { const b = bubbles[msg.id]; if (b) { b.el.classList.remove('streaming'); addBubbleActions(msg.id); recordHist('assistant', renderMd(b.raw), b.raw); } scheduleNavRail(); break; }
    case 'tool_use': addToolCard(msg); break;
    case 'tool_result': updateToolCard(msg);
      if (msg.ok === false && onActive) showNudge('toolfail', '工具执行失败,可试自动修复循环', '🔄 自愈运行', () => $('btn-heal').click());
      break;
    case 'model_diff': addModelDiffCard(msg);          // model_edit 前后语义对比卡(MATLAB 端生成)
      if (++mdiffCount === 3) showNudge('mdiff3', 'AI 已改模型 3 处,建议复核一遍建模规范', '✔ 标准检查', () => $('btn-check').click());
      break;
    case 'change_transaction': addChangeTransactionCard(msg); break; // 检查点、验证与回退结果
    case 'standards_report': addStandardsCard(msg); break;   // 本地建模规范检查报告卡
    case 'testrun_report': addTestRunCard(msg); break;        // Test Manager 本地运行结果卡
    case 'coverage_report': addCoverageCard(msg); break;      // 覆盖率缺口卡
    case 'req_matrix': addReqMatrixCard(msg); break;           // 需求双向追溯矩阵卡
    case 'sf_report': addSfCard(msg); break;                   // Stateflow 结构 + 死逻辑卡
    case 'swdd_draft': addSwddCard(msg); break;                // SWDD 文档骨架卡
    case 'impact_report': addImpactCard(msg); break;           // 接口影响分析卡
    case 'sim_insight': addSimInsightCard(msg); break;         // SDI 仿真分析卡
    case 'sweep_report': addSweepCard(msg); break;             // 参数扫描卡
    // 夜间批量:到点后首条直发、其余入队(复用 queue/flushQueue 链),队空自动导出晨报。
    case 'night_start': {
      const tasks = toArr(msg.tasks).map(String).map((x) => x.trim()).filter(Boolean);
      if (!tasks.length) break;
      const t = tabs[cid]; if (!t) break;
      t.nightMode = true;
      useRender(cid);
      addMsg('user', '🌙 夜间批量任务开始(' + tasks.length + ' 项)');
      if (t.busy) {
        tasks.forEach((x) => t.queue.push({ id: nextId(), text: x }));
        if (cid === activeConv) { renderQueuePanel(); setStatus('夜间任务已排队，当前回答结束后开始'); }
        break;
      }
      tasks.slice(1).forEach((x) => t.queue.push({ id: nextId(), text: x }));
      if (cid === activeConv) renderQueuePanel();
      addUserMessage(tasks[0]);
      sendToBackend(tasks[0], cid);
      break;
    }
    case 'permission_request': addPermission(msg); break;
    case 'result': {
      cancelErrorFinish(cid);
      setBusy(false, cid);
      if (checkupOnDone(cid, !msg.ok)) break;   // 体检子会话:只收集结果,不走主流程
      if (msg.costUsd != null) updateCostBar(msg.costUsd, cid);
      if (onActive) setStatus(msg.ok ? '完成' : '出错');
      flushQueue(cid);
      finishNightIfIdle(cid);
      break;
    }
    // MATLAB figure 兜底 Esc 中断:用户主动停 → 清该会话队列(停就全停,避免卡死)。
    case 'interrupted': { cancelErrorFinish(cid); setBusy(false, cid); const t = tabs[cid]; if (t) { t.nightMode = false; if (t.queue && t.queue.length) { t.queue = []; if (cid === activeConv) renderQueuePanel(); } } if (onActive) setStatus('已中断'); break; }
    // 后端失败通常紧跟 RESULT；延迟兜底可兼容仅发 ERROR 的路径，同时避免队列推进两次。
    case 'error': setBusy(false, cid); if (checkupOnDone(cid, true)) break;
                  addMsg('error', escapeHtml(msg.message || '未知错误')); deferErrorFinish(cid);
                  if (onActive) showNudge('err', '出错了?一键带完整上下文诊断', '🩺 诊断', () => $('btn-diagnose').click());
                  break;
    case 'user_echo': addMsg('user', escapeHtml(msg.text || '')); setBusy(true, cid); break;
    case 'diagnostics': renderDiagnostics(msg.items); break;
    case 'audit': onAudit(msg.entry); break;
    case 'config_changed': onConfigChanged(msg.convId, msg.config); break;
    default: break;
  }
}

// ── 模型语义 diff 卡片:MATLAB 端在 model_edit 前后快照对比,推来 model_diff 事件 ──
// 让工程师"看得见 AI 改了什么":参数 改前→改后 表格 + 新增/删除块 + 父系统前后截图。
function mdLeaf(p) {   // 路径末段(保护块名里的转义斜杠 '//')
  const safe = String(p || '').replace(/\/\//g, '\u0001');
  const parts = safe.split('/');
  return parts[parts.length - 1].replace(/\u0001/g, '/');
}
function addModelDiffCard(msg) {
  const changes = msg.changes || [], added = msg.added || [], removed = msg.removed || [], shots = (msg.shots || []).filter((s) => s && (s.before || s.after));
  if (!changes.length && !added.length && !removed.length && !shots.length) return;
  const el = document.createElement('div');
  el.className = 'mdiff open';   // 默认展开:diff 是要给人看的证据
  const parts = [];
  if (changes.length) parts.push(changes.length + ' 处参数');
  if (added.length) parts.push('+' + added.length + ' 块');
  if (removed.length) parts.push('−' + removed.length + ' 块');
  let body = '';
  if (changes.length) {
    body += '<table><tr><th>块</th><th>参数</th><th>改前</th><th>改后</th></tr>' + changes.map((c) =>
      '<tr><td title="' + escapeHtml(c.block) + '">' + escapeHtml(mdLeaf(c.block)) + '</td><td>' + escapeHtml(c.param) + '</td>' +
      '<td class="md-before">' + escapeHtml(c.before) + '</td><td class="md-after">' + escapeHtml(c.after) + '</td></tr>').join('') + '</table>';
  }
  if (added.length || removed.length) {
    body += '<div class="md-chips">' +
      added.map((p) => '<span class="md-chip add" title="' + escapeHtml(p) + '">＋ ' + escapeHtml(mdLeaf(p)) + '</span>').join('') +
      removed.map((p) => '<span class="md-chip del" title="' + escapeHtml(p) + '">− ' + escapeHtml(mdLeaf(p)) + '</span>').join('') + '</div>';
  }
  if (shots.length) {
    body += shots.map((s) =>
      '<div class="md-shots" data-sys="' + escapeHtml(s.sys || '') + '">' +
      (s.before ? '<div class="md-shot"><div class="cap">改前 · ' + escapeHtml(mdLeaf(s.sys)) + '</div><img src="' + s.before + '"></div>' : '') +
      (s.after ? '<div class="md-shot"><div class="cap">改后 · ' + escapeHtml(mdLeaf(s.sys)) + '</div><img src="' + s.after + '"></div>' : '') +
      '</div>').join('');
  }
  el.innerHTML = '<div class="head"><span class="mdicon">◈</span><span>' + escapeHtml(msg.title || '模型变更核验') + '</span>' +
    '<span class="mdsum">' + escapeHtml(parts.join(' · ') || '截图对比') + '</span></div>' +
    '<div class="body">' + body + '</div>';
  el.querySelector('.head').onclick = () => el.classList.toggle('open');
  el.querySelectorAll('.md-shot img').forEach((img) => { img.onclick = () => img.classList.toggle('zoom'); });  // 点击放大/还原
  clearWelcome(); messages.appendChild(el); scrollDown();
}

// ── 可信模型变更事务：显示编译、规范门禁、自动回退和机器可读证据位置 ──
function addChangeTransactionCard(msg) {
  const states = {
    verified: ['✓', '验证通过', 'var(--ok)'],
    rolled_back: ['↶', '失败，已回退', 'var(--warn)'],
    rollback_failed: ['✕', '回退失败', 'var(--err)'],
    manual_recovery_required: ['!', '需要人工恢复', 'var(--err)']
  };
  const st = states[msg.status] || ['…', String(msg.status || '未知'), 'var(--text2)'];
  const row = (name, ok, detail) => '<tr><td>' + escapeHtml(name) + '</td><td class="sev-' + (ok ? 'ok' : 'error') + '">' +
    (ok ? '✓ 通过' : '✕ 未通过') + '</td><td>' + escapeHtml(detail || '') + '</td></tr>';
  let body = '<table><tr><th>门禁</th><th>状态</th><th>说明</th></tr>' +
    row('模型编译/更新', !!msg.compileOk, msg.compileMessage || '') +
    row('新增规范错误', !!msg.standardsOk, (msg.newStandardErrors || []).join('\n')) + '</table>';
  if (msg.rollbackAttempted || msg.rollbackMessage) {
    body += '<div class="md-chips"><span class="md-chip ' + (msg.rolledBack ? 'add' : 'del') + '">' +
      (msg.rolledBack ? '↶ 已恢复检查点' : '回退状态') + '</span></div>' +
      '<div style="color:var(--text2);margin-top:6px;">' + escapeHtml(msg.rollbackMessage || '') + '</div>';
  } else if (!msg.rollbackAvailable) {
    body += '<div style="color:var(--warn);margin-top:8px;">' +
      escapeHtml(msg.rollbackUnavailableReason || '本轮未启用自动回退。') + '</div>';
  }
  body += '<div class="lbl" style="margin-top:10px;">运行证据</div><pre>' + escapeHtml(msg.manifestFile || '') + '</pre>';
  const el = document.createElement('div');
  el.className = 'mdiff open';
  el.innerHTML = '<div class="head"><span class="mdicon" style="color:' + st[2] + '">' + st[0] + '</span>' +
    '<span>可信变更事务 · ' + escapeHtml(String(msg.model || '')) + '</span>' +
    '<span class="mdsum">' + escapeHtml(st[1]) + '</span></div><div class="body">' + body + '</div>';
  el.querySelector('.head').onclick = () => el.classList.toggle('open');
  clearWelcome(); messages.appendChild(el); scrollDown();
}

// ── 覆盖率缺口卡(coverage_report):决策/条件/MCDC 百分比 + 块级缺口清单 ──
function covPct(pair) { return (pair && pair.length >= 2 && pair[1] > 0) ? Math.round(pair[0] / pair[1] * 100) + '%(' + pair[0] + '/' + pair[1] + ')' : '—'; }
function addCoverageCard(msg) {

  const hasMetrics = [msg.decision, msg.condition, msg.mcdc].some((p) => Array.isArray(p) && p.length >= 2 && p[1] > 0);

  let body = '<div class="md-chips">' +
    '<span class="md-chip add">决策 ' + covPct(msg.decision) + '</span>' +

    '<span class="md-chip add">MCDC ' + covPct(msg.mcdc) + '</span></div>';

    body += '<table><tr><th>块</th><th>指标</th><th>覆盖</th></tr>' + gaps.map((g) =>

      '<td>' + escapeHtml(g.metric) + '</td>' +
      '<td class="sev-warn">' + escapeHtml(g.hit + ' / ' + g.total) + '</td></tr>').join('') + '</table>' +
      '<div class="md-actions"><button class="ma-btn act-ai">🤖 AI 按缺口建议补例</button></div>';

  el.innerHTML = '<div class="head"><span class="mdicon">📊</span><span>覆盖率 · ' + escapeHtml(String(msg.model || '')) + '</span>' +
    '<span class="mdsum">' + (gaps.length ? gaps.length + ' 处缺口' : (hasMetrics ? '无缺口' : '无可用指标')) + '</span></div><div class="body">' + body + '</div>';
  el.querySelector('.head').onclick = () => el.classList.toggle('open');

      ',MCDC ' + covPct(msg.mcdc) + '。未覆盖的块:\n' + brief +

  };

}

// ── 需求双向追溯矩阵卡(req_matrix):真实需求 ID(飞书导出)↔ 模型 block 锚定 ──
function addReqMatrixCard(msg) {

      const blks = (r.blocks || []).map((b) =>
        '<span class="md-chip add req-blk" data-path="' + escapeHtml(b) + '" title="' + escapeHtml(b) + '" style="cursor:pointer">' + escapeHtml(mdLeaf(b)) + '</span>').join(' ');

    }).join('') + '</table>';
  } else {
    body += '<div style="color:var(--muted);padding:4px 0;">需求文件里没有可用条目。</div>';
  }
  if (unknown.length) {
    body += '<div class="md-chips">' + unknown.slice(0, 10).map((u) =>
      '<span class="md-chip del" title="' + escapeHtml(u.block) + '">⚠ ' + escapeHtml(u.req) + ' 不在需求清单</span>').join('') + '</div>';
  }
  body += '<div class="md-actions" style="flex-wrap:wrap">' +
    '<input class="req-id-in" placeholder="REQ-ID" style="width:110px;background:var(--surface3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:2px 8px;font-size:11px;font-family:var(--mono)">' +
    '<button class="ma-btn act-link">🔗 锚定选中块</button>' +
    '<button class="ma-btn act-unlink">解除</button>' +
    '<button class="ma-btn act-ai">🤖 AI 建议锚定</button></div>' +
    '<div style="font-size:10px;color:var(--faint);margin-top:5px">锚定关系存 req_links.json(纯文本,可进 git/review);需求源:飞书多维表格导出 requirements.csv 放项目根即可。</div>';
  el.innerHTML = '<div class="head"><span class="mdicon">📋</span><span>需求追溯 · ' + escapeHtml(String(msg.model || '')) + '</span>' +
    '<span class="mdsum">' + escapeHtml(cov + ' · ' + (msg.source || '')) + '</span></div><div class="body">' + body + '</div>';

// ── /checkup 并行体检:3 个隐藏子会话各查一个维度,全部完成后主会话汇总 ──
// 复用多会话路由(sidecar 原生支持并发 convId)+ fork 型隐藏 tab(不进标签栏/不持久化)。
let checkup = null;   // { convs: {cid:{title,done,answer}}, cardEl, mainConv, seq }
const CHECKUP_DIMS = [
  { key: 'struct', title: '结构与信号流', prompt: '请用 model_overview/model_read 分析当前模型的结构:层级划分是否合理、信号流是否清晰、接口(Inport/Outport)定义是否规范。给出 3-5 条具体发现。' },
  { key: 'risk', title: '建模风险', prompt: '请检查当前模型的建模风险:代数环、采样率混用、数据类型隐式转换、饱和/溢出风险、未初始化状态。给出 3-5 条具体发现(定位到 block)。' },
  { key: 'test', title: '可测性与建议', prompt: '请评估当前模型的可测性:哪些行为值得建回归测试、边界工况有哪些、建议的测试激励。给出 3-5 条具体建议。' },
];
function startCheckup() {
  if (checkup) { setStatus('已有体检在进行中'); return; }
  const mainConv = activeConv;
  const card = document.createElement('div');
  card.className = 'mdiff stdrep open';
  card.innerHTML = '<div class="head"><span class="mdicon">🩻</span><span>模型并行体检</span>' +
    '<span class="mdsum">3 维度并行</span></div><div class="body">' +
    CHECKUP_DIMS.map((d) => '<div class="chk-line" data-k="' + d.key + '">⏳ ' + d.title + ' — 分析中…</div>').join('') + '</div>';
  useRender(mainConv); clearWelcome(); messages.appendChild(card); scrollDown();
  checkup = { convs: {}, cardEl: card, mainConv };
  CHECKUP_DIMS.forEach((d, i) => {
    const cid = 'chk-' + Date.now() + '-' + i;
    const pane = document.createElement('div');            // 脱离 DOM 的暗渲染容器
    makeForkState(cid, pane);                               // isFork:不进标签栏/不持久化
    checkup.convs[cid] = { key: d.key, title: d.title, done: false, answer: '' };
    setBusy(true, cid);
    toMatlab('user_message', { id: nextId(), text: d.prompt, convId: cid });
  });
  setStatus('并行体检启动(3 个子会话)…');
}
function checkupOnDone(cid, failed) {
  if (!checkup || !checkup.convs[cid]) return false;
  const c = checkup.convs[cid];
  const t = tabs[cid];
  if (!c.done) {
    c.done = true;
    if (!failed && t) {   // 取该子会话最后一条助手回答的原文
      const bs = Object.values(t.bubbles || {});
      if (bs.length) c.answer = String(bs[bs.length - 1].raw || '');
    }
    const line = checkup.cardEl.querySelector('.chk-line[data-k="' + c.key + '"]');
    if (line) line.textContent = (failed || !c.answer ? '✕ ' : '✓ ') + c.title + (failed ? ' — 失败' : ' — 完成');
  }
  if (Object.values(checkup.convs).every((x) => x.done)) {   // 全部完成 → 主会话汇总
    const parts = Object.values(checkup.convs).map((x) =>
      '## ' + x.title + '\n' + (x.answer ? x.answer.slice(0, 1500) : '(该维度分析失败)').trim()).join('\n\n');
    const mc = checkup.mainConv;
    Object.keys(checkup.convs).forEach((k) => {
      cancelErrorFinish(k);
      rememberClosedConv(k);
      delete tabs[k];
      toMatlab('close_conv', { convId: k });
    });
    checkup = null;
    useRender(mc);
    addMsg('user', '🩻 汇总体检报告');
    setBusy(true, mc);
    toMatlab('user_message', { id: nextId(), convId: mc,
      text: '三个并行子分析已完成,原始结果如下:\n\n' + parts +
        '\n\n请把它们汇总成一份结构化的模型体检报告:总体评分、按严重度排序的问题清单(定位到 block)、改进建议优先级。' });
  }
  return true;
}

function addPermission(msg) {
  const el = document.createElement('div');
  el.className = 'perm';
  const label = diffLabel(msg.diff);
  const actionHtml = msg.action
    ? '<div class="diff-model">操作: ' + escapeHtml(msg.action) + '</div>' : '';
  const bodyHtml = actionHtml + (msg.diff
    ? renderDiff(msg.diff)
    : '<pre>' + escapeHtml(JSON.stringify(msg.input, null, 2)) + '</pre>');
  el.innerHTML =
    '<div class="q">' + ICON.warn +
    '<span>' + label + '<span class="tool-name">' + escapeHtml(msg.tool) + '</span></span></div>' +
    bodyHtml +
    '<div class="btns"><button class="allow">✓ 允许</button><button class="deny">✕ 拒绝</button></div>';
  el.querySelector('.allow').onclick = () => respondPerm(el, msg.convId, msg.id, true);
  el.querySelector('.deny').onclick = () => respondPerm(el, msg.convId, msg.id, false);
  clearWelcome(); messages.appendChild(el); scrollDown();
}
function diffLabel(diff) {
  if (!diff) return '即将执行可能有副作用的操作：';
  return { model_edit: '即将修改 Simulink 模型：', code_exec: '即将执行 MATLAB 代码：',
           file_run: '即将运行脚本文件：', file_write: '即将写入本地文件：',
           model_test: '即将运行模型测试：' }[diff.type] || '即将执行：';
}
function renderDiff(diff) {
  switch (diff.type) {
    case 'model_edit': {
      const modelLine = diff.model
        ? '<div class="diff-model">模型: <code>' + escapeHtml(diff.model) + '</code></div>' : '';
      const rows = diff.changes.map(c =>
        '<tr><td class="diff-block" title="' + escapeHtml(c.block) + '">' + escapeHtml(shortBlock(c.block)) + '</td>' +
        '<td class="diff-param">' + escapeHtml(c.param) + '</td>' +
        '<td class="diff-new">' + escapeHtml(c.value) + '</td></tr>'
      ).join('');
      return modelLine +
        '<table class="diff-table"><thead><tr><th>块路径</th><th>参数</th><th>→ 新值</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>';
    }
    case 'code_exec':
      return '<pre class="diff-code">' + escapeHtml(diff.code) + '</pre>';
    case 'file_run':
      return '<div class="diff-file">📄 ' + escapeHtml(diff.file) +
             (diff.args ? '  ' + escapeHtml(diff.args) : '') + '</div>';
    case 'file_write':
      return '<div class="diff-file">📄 ' + escapeHtml(diff.file || '') +
             (diff.exists ? '<div class="sev-warn">现有文件将被覆盖</div>' : '') + '</div>';
    case 'model_test':
      return '<div class="diff-file">🧪 ' + escapeHtml(diff.model) + '</div>';
    default:
      return '<pre>' + escapeHtml(JSON.stringify(diff, null, 2)) + '</pre>';
  }
}
function shortBlock(p) {
  const parts = String(p).split('/');
  return parts.length > 3 ? '…/' + parts.slice(-2).join('/') : p;
}
function respondPerm(el, convId, id, approved) {
  toMatlab('permission_response', { convId: convId || activeConv, id, approved });
  el.classList.add('resolved');
  el.querySelector('.q span:last-child').insertAdjacentText('beforeend', approved ? '（已允许）' : '（已拒绝）');
}

// MATLAB 把单元素 string 数组编码成标量字符串,这里统一强制成数组再计数。
function toArr(x) { return Array.isArray(x) ? x : (x === undefined || x === null || x === '') ? [] : [x]; }
function baseName(p) { return String(p).split(/[\\/]/).pop(); }
function leaf(s) { return String(s).split('/').pop(); }
function ctxRow(k, v) { return '<div class="ctx-row"><b>' + k + '</b><span>' + v + '</span></div>'; }

// 结构化诊断卡片(对标官方诊断查看器:按严重度 + 每条可跳转高亮对应 block)。
function renderDiagnostics(items) {
  items = toArr(items);
  if (!items.length) return;
  const sev = (s) => ({ error: { ic: '⛔', c: 'err' }, warning: { ic: '⚠', c: 'warn' }, info: { ic: 'ℹ', c: 'info' } }[String(s || 'error').toLowerCase()] || { ic: '⛔', c: 'err' });
  const rows = items.map((d) => {
    const s = sev(d.severity);
    const jump = d.block ? '<button class="diag-jump" data-blk="' + escapeHtml(d.block) + '">🎯 高亮 ' + escapeHtml(leaf(d.block)) + '</button>' : '';
    return '<div class="diag-row ' + s.c + '"><span class="diag-ic">' + s.ic + '</span><div class="diag-b"><div class="diag-msg">' +
      escapeHtml(d.message || '') + '</div>' + (d.id ? '<code class="diag-id">' + escapeHtml(d.id) + '</code>' : '') + jump + '</div></div>';
  }).join('');
  const card = document.createElement('div');
  card.className = 'diagcard';
  card.innerHTML = '<div class="diag-head">🩺 结构化诊断 · ' + items.length + ' 条</div>' + rows;
  clearWelcome(); messages.appendChild(card);
  card.querySelectorAll('.diag-jump').forEach((b) => b.onclick = () => { toMatlab('jump_block', { path: b.dataset.blk }); setStatus('已高亮: ' + leaf(b.dataset.blk)); });
  scrollDown();
}

// ── UI → MATLAB 动作 ────────────────────────────────────────────────────────
function setBusy(b, conv) {
  const t = getTab(conv || activeConv);
  t.busy = b;
  // 分支(fork)的忙状态:禁用其发送按钮即可。
  if (t.isFork) { if (t.sendBtn) t.sendBtn.disabled = b; return; }
  // 标签页上的忙指示。
  const tabEl = $('tabs-list') && $('tabs-list').querySelector('.tab[data-conv="' + t.convId + '"]');
  if (tabEl) tabEl.classList.toggle('busy', b);
  // 只有当前活动标签的忙状态驱动发送/停止/状态点。
  if (t.convId === activeConv) {
    busy = b;
    // 互斥:回答中【隐藏发送、只显示醒目的「停止」】,确保中断入口一眼可见。
    $('send').style.display = b ? 'none' : '';
    $('stop').style.display = b ? 'inline-flex' : 'none';
    $('sdot').className = 'sdot ' + (b ? 'busy' : 'live');
  }
}
// ── 成本追踪 ──────────────────────────────────────────────────────────────
// 费用按标签页累计(挂在 tab 上),成本条只显示当前活动标签的累计值,避免多标签数字语义混淆。
function updateCostBar(turnCost, convId) {
  const t = tabs[convId || activeConv]; if (!t) return;
  t.costUsd = (t.costUsd || 0) + turnCost;
  if ((convId || activeConv) === activeConv) renderCostBar();
}
function renderCostBar() {
  const bar = $('cost-bar');
  const c = (activeTab() && activeTab().costUsd) || 0;
  if (c <= 0) { bar.classList.add('hidden'); return; }
  bar.textContent = '$' + c.toFixed(4);
  bar.title = `本标签累计费用 $${c.toFixed(4)}`;
  bar.classList.remove('hidden');
}

// ── 会话导出 ──────────────────────────────────────────────────────────────
function exportSession(convId) {
  const tab = tabs[convId || activeConv];
  if (!tab || !tab.history || !tab.history.length) {
    if (!convId || convId === activeConv) setStatus('当前会话无可导出的内容');
    return false;
  }
  // 直接用 history(含恢复的历史):assistant 用原始 markdown,user 用 html 去标签为纯文本。
  const tmp = document.createElement('div');
  const lines = ['# MATLAB Copilot 会话记录\n'];
  for (const m of tab.history) {
    let body;
    if (m.role === 'assistant' && m.raw !== undefined) {
      body = m.raw;
    } else { tmp.innerHTML = m.html || ''; body = tmp.textContent.trim(); }
    lines.push((m.role === 'user' ? '## 👤 用户' : '## 🤖 Copilot') + '\n\n' + body + '\n\n---\n');
  }
  const md = lines.join('\n');
  const ts = new Date().toISOString().slice(0, 16).replace('T', '_').replace(':', '-');
  const a = document.createElement('a');
  a.href = 'data:text/markdown;charset=utf-8,' + encodeURIComponent(md);
  a.download = 'copilot-' + ts + '.md';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  return true;
}

let lastSentMsg = '';
// 插入模式:回答中再发消息时,'queue'=排队待当前回答结束、'steer'=中断当前改按新输入回复。
let insertMode = (function(){ try { return localStorage.getItem('mc-insert-mode') || 'queue'; } catch(e){ return 'queue'; } })();

// 便签 + 输入框文字合并成一条消息(便签在后,带编号+锚点)。
function buildFinalText() {
  const text = $('input').value.trim();
  const ns = curNotes();
  if (!ns.length) return text;
  const lines = ns.map((n, i) => (i + 1) + '. ' + (n.snippet ? '针对「' + n.snippet + '」：' : '') + n.question);
  const block = '我对你前面的回答有 ' + ns.length + ' 处批注，请逐条编号回答：\n' + lines.join('\n');
  return text ? text + '\n\n' + block : block;
}
function clearComposer() {
  $('input').value = ''; $('input').style.height = 'auto';
  const t = activeTab(); if (t) t.pendingNotes = [];   // 便签清空(高亮保留作"已问过"痕迹)
  renderNotesArea();
}
// 真正把一条消息发往后端(渲染用户气泡 + 置忙 + toMatlab)。
// 只把消息发往后端(置忙 + toMatlab);用户气泡由调用方在发送前先显示,
// 这样队列/引导模式也能【立刻看到自己发的内容】(后端排队由 adapter 兜底,不会再「上一轮尚未结束」)。
function sendToBackend(finalText, convId) {
  const cid = convId || activeConv;
  setBusy(true, cid);
  toMatlab('user_message', { id: nextId(), text: finalText || '请查看我附加的图片/文件并据此回答。', convId: cid });
}
// 中断当前回答(用户主动 Stop/Esc)。会【清空当前会话的待发送队列】——「停」就是全停,避免队列卡死。
function interruptCurrent() {
  const t = activeTab();
  if (!t) return;
  if (t.busy) { toMatlab('interrupt', { convId: t.convId }); setBusy(false, t.convId); }
  if (t.queue && t.queue.length) { t.queue = []; renderQueuePanel(); }
  setStatus('已中断');
}
function sendMessage() {
  const text = $('input').value.trim();
  if (!text && !curNotes().length && !attachmentCount(activeConv)) return;   // 无文本、无便签、无当前标签附件才拦
  const finalText = buildFinalText();
  if (text) lastSentMsg = text;
  const t = activeTab();

  // 队列模式 + 回答中:不挤进对话流,显示在【右下角队列区】候着,当前回答结束后依次自动发(见 flushQueue)。
  if (t.busy && insertMode === 'queue') {
    clearComposer();
    t.queue.push({ id: nextId(), text: finalText });   // 带 id,删除按 id 不受 shift 影响
    renderQueuePanel();
    setStatus('已排队（' + t.queue.length + '），当前回答结束后自动发送');
    return;
  }

  // 立即 / 引导:进对话流显示用户气泡。
  useRender(t.convId);
  addUserMessage(finalText || '（见附件）');
  clearComposer();

  if (t.busy && insertMode === 'steer') {
    // 引导:中断当前后端回答 + 立即发新指令。busy 保持 true(不本地 setBusy false,避免与中断回执竞态);
    // 后端 adapter 的 _pending 队列兜底:interrupt 先 kill,新消息排队等 close 后自动发(不丢、不报「上一轮未结束」)。
    toMatlab('interrupt', { convId: t.convId });
    sendToBackend(finalText, t.convId);
    setStatus('已中断，优先执行新指令…');
  } else {
    sendToBackend(finalText, t.convId);
  }
}
// 一轮回答结束后(result/interrupted/error 都算回合终结),若该会话有排队消息,取队首进对话流并发出。
function flushQueue(convId) {
  const t = tabs[convId];
  if (!t || t.busy || !t.queue || !t.queue.length) return;
  const item = t.queue.shift();
  if (convId === activeConv) renderQueuePanel();
  useRender(convId);
  addUserMessage(item.text);     // 轮到了 → 进对话流显示
  sendToBackend(item.text, convId);
}
function cancelErrorFinish(convId) {
  const t = tabs[convId];
  if (t && t.errorFinishTimer) { clearTimeout(t.errorFinishTimer); t.errorFinishTimer = null; }
}
function deferErrorFinish(convId) {
  const t = tabs[convId]; if (!t) return;
  cancelErrorFinish(convId);
  t.errorFinishTimer = setTimeout(() => {
    const current = tabs[convId]; if (!current) return;
    current.errorFinishTimer = null;
    if (current.busy) return;
    flushQueue(convId);
    finishNightIfIdle(convId);
  }, 1000);
}
function finishNightIfIdle(convId) {
  const t = tabs[convId];
  if (!t || !t.nightMode || t.busy || (t.queue && t.queue.length)) return;
  t.nightMode = false;
  try {
    const exported = exportSession(convId);
    if (exported && convId === activeConv) setStatus('🌙 夜间任务全部完成,晨报已导出');
  } catch (e) {}
}
// 渲染右下角待发送队列(显示当前活动标签的队列;每条按 id 单独删)。
function renderQueuePanel() {
  const panel = $('queue-panel');
  const t = activeTab();
  const q = (t && t.queue) || [];
  panel.innerHTML = '';
  if (!q.length) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');
  const title = document.createElement('div'); title.className = 'qp-title';
  title.textContent = '⏳ 待发送队列 (' + q.length + ')';
  panel.appendChild(title);
  q.forEach((item, i) => {
    const card = document.createElement('div'); card.className = 'queue-card';
    const n = document.createElement('span'); n.className = 'qc-n'; n.textContent = (i + 1) + '.';
    const body = document.createElement('div'); body.className = 'qc-text';
    body.textContent = item.text.replace(/\n+/g, ' '); body.title = item.text;
    const x = document.createElement('span'); x.className = 'qc-x'; x.textContent = '✕'; x.title = '移出队列';
    x.onclick = () => { t.queue = t.queue.filter((it) => it.id !== item.id); renderQueuePanel(); };  // 按 id 删,不受 shift 影响
    card.appendChild(n); card.appendChild(body); card.appendChild(x);
    panel.appendChild(card);
  });
}
function quickChat(label, text) {

// 助手气泡内选中文字 → 右键 → 弹批注框(无选区时放行系统右键菜单)。
$('panes').addEventListener('contextmenu', (e) => {

(function initTips() {
  const tip = $('tip');
  let timer = null, cur = null;
  function show(el) {
    const t = el.getAttribute('data-tip'); if (!t) return;
    const title = el.textContent.trim();
    tip.innerHTML = '<b>' + escapeHtml(title) + '</b><br>' + escapeHtml(t).replace(/\n/g, '<br>');
    tip.classList.add('show');
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight, pad = 8;
    let left = Math.min(Math.max(pad, r.left), window.innerWidth - tw - pad);
    let top = r.top - th - 8;               // 默认放按钮上方
    if (top < pad) top = r.bottom + 8;       // 上方放不下则放下方
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }
  function hide() { tip.classList.remove('show'); cur = null; if (timer) { clearTimeout(timer); timer = null; } }
  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest && e.target.closest('[data-tip]');
    if (!el || el === cur) return;
    hide(); cur = el;
    timer = setTimeout(() => show(el), 2000);   // 悬停满 2 秒才弹
  });
  document.addEventListener('mouseout', (e) => {
    const el = e.target.closest && e.target.closest('[data-tip]');
    if (el && el === cur) hide();
  });
  document.addEventListener('scroll', hide, true);
  document.addEventListener('click', hide, true);
})();

let renamingConv = null;   // 正在改名的标签 convId(改名态由 renderTabs 渲染输入框,避免被重绘冲掉)
function renderTabs() {
  const list = $('tabs-list');
  list.innerHTML = '';
  const real = Object.values(tabs).filter((t) => !t.isFork);   // 分支(fork)不进标签栏
  const multi = real.length > 1;
  real.forEach((t) => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.convId === activeConv ? ' active' : '') + (t.busy ? ' busy' : '');
    el.dataset.conv = t.convId;
    if (renamingConv === t.convId) {
      el.innerHTML = '<span class="tdot"></span><input class="tname-input" value="' + escapeHtml(t.name) + '">';
    } else {
      el.innerHTML = '<span class="tdot"></span><span class="tname">' + escapeHtml(t.name) + '</span>' +
        (multi ? '<span class="tx" title="关闭">×</span>' : '');
    }
    el.onclick = (e) => {
      if (e.target.classList.contains('tname-input')) { e.stopPropagation(); return; }
      if (e.target.classList.contains('tx')) closeTab(t.convId);
      else if (renamingConv !== t.convId) switchTab(t.convId);
    };
    el.ondblclick = (e) => { if (!e.target.classList.contains('tx')) startRename(t.convId); };
    list.appendChild(el);
  });
  // 渲染后聚焦改名输入框并接线提交。
  if (renamingConv) {
    const inp = list.querySelector('.tname-input');
    if (inp) {
      inp.focus(); inp.select();
      const commit = () => {
        if (renamingConv === null) return;       // 防 Enter + blur 双触发
        const t = tabs[renamingConv]; if (t) t.name = (inp.value || '').trim() || t.name;
        renamingConv = null; renderTabs();
      };
      inp.onblur = commit;
      inp.onkeydown = (e) => {
        e.stopPropagation();
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { renamingConv = null; renderTabs(); }
      };
      inp.onclick = (e) => e.stopPropagation();
    }
  }
}

// ── 对话轮次导航轨(minimap + 跳转锚点)──────────────────────────────────────
// 一轮 = 一条用户消息 + 其后助手回答;刻度 = 用户气泡,按 offsetTop/scrollHeight 映射到轨道高度。
// <4 轮隐藏;始终针对 activeTab().pane(per-tab);scroll-spy 高亮"我在哪一轮";悬停预览问答首句。
let navRail = null, navPreview = null, navRailRaf = 0, navSpyRaf = 0;
const NAV_MIN_TURNS = 3;   // 少于这么多轮不显示导航轨(短对话滚动成本低,轨道反而碍眼);空/新会话自然没有
function ensureNavRail() {
  if (navRail) return;
  navRail = document.createElement('div'); navRail.id = 'nav-rail';
  navPreview = document.createElement('div'); navPreview.className = 'nav-preview';
  $('panes').appendChild(navRail);
  $('panes').appendChild(navPreview);   // 预览卡挂 #panes(不在小框内),可越出框、在视口内自由摆放
}
function navRowText(row) {                                // 取气泡正文,排除挂在气泡里的操作按钮(✎编辑/⧉复制/✚批注/⑂Fork)
  const b = row && row.querySelector('.bubble');
  if (!b) return '';
  let s = '';
  b.childNodes.forEach((n) => { if (n.nodeType === 1 && n.classList && n.classList.contains('msg-actions')) return; s += n.textContent || ''; });
  return s;
}
function navClip(s, n) { s = String(s || '').replace(/\s+/g, ' ').trim(); return s.length > n ? s.slice(0, n) + '…' : s; }
// 收集一轮的信息(遇到下一条用户消息即止):第一条助手回答文本 + 助手回合数 + 本轮调用过的工具名。
function navTurnInfo(userRow) {
  const tools = []; let answer = '', aCount = 0, toolOk = 0, toolFail = 0, hasCode = false, hasDiff = false;
  for (let el = userRow.nextElementSibling; el; el = el.nextElementSibling) {
    if (!el.classList) continue;
    if (el.classList.contains('row') && el.classList.contains('user')) break;
    if (el.classList.contains('tool')) {
      const nm = el.querySelector('.name'); if (nm) tools.push(nm.textContent.trim());
      if (el.classList.contains('ok')) toolOk++; else if (el.classList.contains('fail')) toolFail++;
    } else if (el.classList.contains('perm')) { hasDiff = true; }   // 权限/diff 确认卡
    else if (el.classList.contains('row') && el.classList.contains('assistant')) {
      aCount++; if (!answer) answer = navRowText(el);
      if (el.querySelector('pre, code')) hasCode = true;            // 助手回答含代码块
    }
  }
  return { answer, tools, aCount, toolOk, toolFail, hasCode, hasDiff };
}
function scheduleNavRail() { if (navRailRaf) return; navRailRaf = requestAnimationFrame(() => { navRailRaf = 0; rebuildNavRail(); }); }
function rebuildNavRail() {
  ensureNavRail();
  const t = activeTab(), pane = t && t.pane;
  if (!pane) { navRail.style.display = 'none'; return; }
  const userRows = [...pane.querySelectorAll(':scope > .row.user')];   // 仅直接子:排除 Fork 分支(嵌在气泡内的 .fork-msgs)里的用户行,否则导航轨会把 fork 轮次算进主会话
  if (userRows.length < NAV_MIN_TURNS) {   // 轮次太少:隐藏轨道,并清掉上一个 tab 残留的刻度/预览(否则切换会话后 DOM 里残留)
    navRail.style.display = 'none';
    [...navRail.querySelectorAll('.nav-tick')].forEach((x) => x.remove());
    navPreview.style.display = 'none';
    return;
  }
  navRail.style.display = 'block';
  [...navRail.querySelectorAll('.nav-tick')].forEach((x) => x.remove());  // 清旧刻度
  // 等距紧凑排列(不按内容比例):刻度集中成一条短刻度,圆角框紧贴刻度组;挤不下时自适应缩小间距,始终 fit 不滚动。
  const n = userRows.length;
  const avail = (pane.clientHeight || 400) - 44;          // 框竖向最多占用的空间
  const gap = Math.min(9, (avail - 10) / Math.max(1, n));
  userRows.forEach((row, i) => {
    const tick = document.createElement('div'); tick.className = 'nav-tick';
    tick.style.top = (5 + i * gap) + 'px';
    tick._row = row;
    tick.addEventListener('mouseenter', () => showNavPreview(tick, row, i + 1, n));
    tick.addEventListener('mouseleave', () => { navPreview.style.display = 'none'; });
    tick.addEventListener('click', () => navJumpTo(pane, row));
    navRail.appendChild(tick);
  });
  navRail.style.height = (10 + (n - 1) * gap + 3) + 'px';  // 上下 padding(各5) + 刻度跨度 → 框紧贴刻度组
  updateNavSpy();
}
function showNavPreview(tick, row, idx, total) {
  const q = navClip(navRowText(row), 90);
  const info = navTurnInfo(row);
  let html = '<div class="np-idx">第 ' + idx + ' / ' + total + ' 轮 · 点击跳转</div>';
  const badges = [];   // 元信息徽章:回合数 / 工具成功失败 / 代码 / diff(都从 DOM 现读)
  if (info.aCount > 1) badges.push('💬 ' + info.aCount + ' 答');
  if (info.toolOk) badges.push('<span class="ok">' + info.toolOk + ' ✓</span>');
  if (info.toolFail) badges.push('<span class="fail">' + info.toolFail + ' ✕</span>');
  if (info.hasCode) badges.push('⟨⟩ 代码');
  if (info.hasDiff) badges.push('◈ diff');
  if (badges.length) html += '<div class="np-meta">' + badges.join('<span class="np-dot">·</span>') + '</div>';
  html += '<div class="np-q">🙋 ' + escapeHtml(q || '(空)') + '</div>';
  if (info.tools.length) {                               // 该轮调用过的工具(去重,最多列 3 个 + 余数)
    const uniq = [...new Set(info.tools)];
    html += '<div class="np-tools">🔧 ' + uniq.slice(0, 3).map(escapeHtml).join(' · ') +
            (uniq.length > 3 ? ' +' + (uniq.length - 3) : '') + '</div>';
  }
  if (info.answer) html += '<div class="np-a">✦ ' + escapeHtml(navClip(info.answer, 130)) + '</div>';
  navPreview.innerHTML = html;
  navPreview.style.display = 'block';
  const panesH = $('panes').clientHeight, ph = navPreview.offsetHeight;   // 预览卡相对 #panes 定位,可越出小框、在视口内自由摆放
  const top = navRail.offsetTop + (parseFloat(tick.style.top) || 0) - ph / 2;
  navPreview.style.top = Math.max(6, Math.min(panesH - ph - 6, top)) + 'px';
}
function navJumpTo(pane, row) {
  pane.scrollTo({ top: Math.max(0, row.offsetTop - 10), behavior: 'smooth' });
  const rows = [row];                                    // 该轮 = 用户行 + 其后助手行(到下一用户行止)
  for (let el = row.nextElementSibling; el; el = el.nextElementSibling) {
    if (el.classList && el.classList.contains('row')) { if (el.classList.contains('user')) break; rows.push(el); }
  }
  rows.forEach((r) => { r.classList.add('turn-flash'); setTimeout(() => r.classList.remove('turn-flash'), 1100); });
}
function updateNavSpy() {
  if (!navRail || navRail.style.display === 'none') return;
  const t = activeTab(), pane = t && t.pane; if (!pane) return;
  const ticks = [...navRail.querySelectorAll('.nav-tick')]; if (!ticks.length) return;
  const probe = pane.scrollTop + pane.clientHeight * 0.28;   // 视口上部判定线 = "当前所在轮"
  let act = 0;
  ticks.forEach((tk, i) => { if (tk._row.offsetTop <= probe) act = i; });
  ticks.forEach((tk, i) => tk.classList.toggle('active', i === act));
}
function scheduleNavSpy() { if (navSpyRaf) return; navSpyRaf = requestAnimationFrame(() => { navSpyRaf = 0; updateNavSpy(); }); }
// scroll 事件不冒泡 → 捕获阶段在 #panes 上委托,只响应当前 active pane 的滚动。

function saveThemeChoice(c) { try { localStorage.setItem('mc-theme', c); } catch (e) {} }
// 实际着色:mode = light|dark。dark 是默认(无 data-theme)。
function paintTheme(mode) { document.documentElement.setAttribute('data-theme', mode === 'light' ? 'light' : 'dark'); }
function onMBSEWorkflowState(state, message) {
  mbseState = { ...mbseState, ...(state || {}) };
  $('tb-mbse').classList.toggle('active', mbseState.initialized === true);
  $('tb-mbse').title = mbseState.initialized
    ? 'MBSE 工程流程 · 当前 ' + (mbseState.currentPhase || 'R') : 'MBSE 工程流程';
  if (message) setStatus(message);
  if (!$('mbse-pop').classList.contains('hidden')) renderMBSEWorkflow();
}

function mbsePhase(id) {
  return toArr(mbseState.phases).find((phase) => phase.id === id) ||
    { id, name: id, status: id === 'R' ? 'draft' : 'planned' };
}

function mbseConfigPayload() {
  return {
    systemName: $('mbse-system')?.value.trim() || 'UntitledSystem',
    description: $('mbse-description')?.value.trim() || '',
    requirementsSource: $('mbse-req-source')?.value.trim() || '',
    entryPhase: $('mbse-entry')?.value || mbseSelectedPhase || 'R',
  };
}

function requestMBSE(action) {
  toMatlab('mbse_workflow', {
    action, phase: mbseSelectedPhase,
    projectRoot: activeTab()?.context?.projectInfo?.root || '',
    workflowConfig: mbseConfigPayload(),
  });
}

function renderMBSEWorkflow() {
  const pop = $('mbse-pop');
  const selected = mbsePhase(mbseSelectedPhase);
  const status = selected.status || 'planned';
  const caps = mbseState.capabilities || {};
  const labels = { draft: '草稿', proposed: '待批准', approved: '已批准', generated: '已生成',
    executed: '待确认', confirmed: '已确认', planned: '后续阶段', blocked: '阻塞' };
  const phases = ['R', 'F', 'L', 'P', 'V'].map((id) => {
    const phase = mbsePhase(id);
    return '<button class="mbse-phase ' + (id === mbseSelectedPhase ? 'active' : '') + '" data-mbse-phase="' + id + '"' +
      '><b>' + id + ' · ' + escapeHtml(phase.name || id) + '</b>' +
      escapeHtml(labels[phase.status] || phase.status || 'planned') + '</button>';
  }).join('');
  const root = mbseState.projectRoot || activeTab()?.context?.projectInfo?.root || '当前 MATLAB 工作目录';
  const reqSource = mbseState.requirementsSource || 'requirements.csv';
  const funcSource = mbseState.functionalSource || 'mbse/architecture/functional-architecture.json';
  const phaseSources = {
    R: reqSource,
    F: funcSource,
    L: mbseState.logicalSource || 'mbse/architecture/logical-architecture.json',
    P: mbseState.physicalSource || 'mbse/architecture/physical-architecture.json',
    V: mbseState.verificationSource || 'mbse/verification-plan.json',
  };
  const canRun = selected.id === 'R' ? caps.requirementsToolbox !== false
    : (['F', 'L', 'P'].includes(selected.id) ? caps.systemComposer !== false : true);
  const selectedIndex = ['R', 'F', 'L', 'P', 'V'].indexOf(selected.id);
  const previousConfirmed = selectedIndex <= 0 || mbsePhase(['R', 'F', 'L', 'P', 'V'][selectedIndex - 1]).status === 'confirmed';
  const canPropose = mbseState.initialized && previousConfirmed;
  pop.innerHTML = '<div class="pop-title">MBSE 工程流程<span class="pop-hint">RFLPV</span></div>' +
    '<div class="mbse-head"><b>' + escapeHtml(mbseState.systemName || '未初始化工程') + '</b><small>' + escapeHtml(root) + '</small></div>' +
    '<div class="mbse-phases">' + phases + '</div>' +
    '<div class="mbse-fields"><input id="mbse-system" maxlength="100" placeholder="系统名称" value="' + escapeAttr(mbseState.systemName === 'UntitledSystem' ? '' : (mbseState.systemName || '')) + '">' +
    '<textarea id="mbse-description" maxlength="1000" placeholder="系统边界与工程目标">' + escapeHtml(mbseState.description || '') + '</textarea>' +
    '<input id="mbse-req-source" maxlength="500" placeholder="需求源相对路径" value="' + escapeAttr(reqSource) + '">' +
    '<select id="mbse-entry"><option value="R"' + ((mbseState.currentPhase || 'R') === 'R' ? ' selected' : '') + '>从需求阶段开始</option>' +
    '<option value="F"' + ((mbseState.currentPhase || 'R') === 'F' ? ' selected' : '') + '>复用既有需求，从功能架构开始</option></select></div>' +
    '<div class="mbse-meta"><b>' + escapeHtml(selected.id + ' · ' + (selected.name || '阶段')) + '</b> · ' + escapeHtml(labels[status] || status) +
    (selected.summary ? '<br>' + escapeHtml(selected.summary) : '') +
    '<br>阶段源: ' + escapeHtml(phaseSources[selected.id] || '') +
    '<br>能力: Requirements ' + (caps.requirementsToolbox ? '可用' : '不可用') + ' · System Composer ' + (caps.systemComposer ? '可用' : '不可用') + '</div>' +
    '<div class="mbse-actions"><button id="mbse-init"' + (mbseState.initialized ? ' disabled' : '') + '>初始化</button>' +
    '<button id="mbse-propose"' + (!canPropose ? ' disabled' : '') + '>' + (status === 'draft' ? '提案' : '重新提案') + '</button>' +
    '<button id="mbse-approve"' + (status !== 'proposed' ? ' disabled' : '') + '>批准</button>' +
    '<button id="mbse-generate"' + (status !== 'approved' ? ' disabled' : '') + '>生成</button>' +
    '<button id="mbse-run"' + (!canRun || !['generated', 'executed'].includes(status) ? ' disabled' : '') + '>执行</button>' +
    '<button id="mbse-confirm"' + (status !== 'executed' ? ' disabled' : '') + '>确认</button></div>';
  pop.querySelectorAll('[data-mbse-phase]').forEach((button) => {
    button.onclick = () => { mbseSelectedPhase = button.dataset.mbsePhase; renderMBSEWorkflow(); };
  });
  $('mbse-init').onclick = () => requestMBSE('initialize');
  $('mbse-propose').onclick = () => requestMBSE('propose');
  $('mbse-approve').onclick = () => requestMBSE('approve');
  $('mbse-generate').onclick = () => requestMBSE('generate');
  $('mbse-run').onclick = () => requestMBSE('run');
  $('mbse-confirm').onclick = () => requestMBSE('confirm');
}

function applyThemeChoice(choice) {
  themeChoice = choice; saveThemeChoice(choice);
  if (choice === 'light' || choice === 'dark') paintTheme(choice);
  else toMatlab('request_theme', {});   // auto:问 MATLAB 当前是明是暗
  reflectTheme();
}
function reflectTheme() {
  document.querySelectorAll('#theme-pop .pop-item').forEach((it) => it.classList.toggle('active', it.dataset.themeChoice === themeChoice));
}
$('tb-theme').onclick = (e) => { e.stopPropagation(); togglePop('theme-pop'); };
$('tb-audit').onclick = (e) => { e.stopPropagation(); renderAudit(); togglePop('audit-pop'); };
$('tb-recorder').onclick = (e) => {
  e.stopPropagation();
  renderRecorder();
  togglePop('recorder-pop');
  toMatlab('change_recorder_control', { action: 'status' });
};
$('recorder-pop').addEventListener('click', (e) => e.stopPropagation());
$('tb-mbse').onclick = (e) => {
  e.stopPropagation();
  renderMBSEWorkflow();
  togglePop('mbse-pop');
  toMatlab('mbse_workflow', {
    action: 'status', phase: mbseSelectedPhase,
    projectRoot: activeTab()?.context?.projectInfo?.root || '',
  });
};
$('mbse-pop').addEventListener('click', (e) => e.stopPropagation());
document.querySelectorAll('#theme-pop .pop-item').forEach((it) => it.onclick = () => { applyThemeChoice(it.dataset.themeChoice); hidePops(); });
// 选了「随 MATLAB」时,窗口重新获焦就再同步一次(覆盖期间改了 MATLAB 主题的情况)。
window.addEventListener('focus', () => { if (themeChoice === 'auto') toMatlab('request_theme', {}); });
// 初始化:读保存的选择并先着色(auto 先按 dark 占位,等 MATLAB 回主题再覆盖)。
themeChoice = loadThemeChoice();
paintTheme(themeChoice === 'light' ? 'light' : 'dark');
reflectTheme();

// 输入框打 / 时弹出斜杠菜单;Enter 提交斜杠命令
function hidePop(id) { $(id).classList.add('hidden'); }
$('input').addEventListener('input', (e) => {
  const v = e.target.value;
  if (/^\/\S*$/.test(v)) { buildSlash(v); showPop('slash-pop'); } else hidePop('slash-pop');
});
// 面板内 ↑/↓/Esc 键盘导航
$('slash-pop').addEventListener('keydown', (e) => {
  const items = [...$('slash-pop').querySelectorAll('.pop-item')];
  const idx = items.indexOf(document.activeElement);
  if (e.key === 'ArrowDown') { e.preventDefault(); items[(idx + 1) % items.length]?.focus(); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); if (idx <= 0) { hidePop('slash-pop'); $('input').focus(); } else items[idx - 1]?.focus(); }
  if (e.key === 'Escape')    { e.preventDefault(); hidePop('slash-pop'); $('input').focus(); }
});
// 捕获阶段:斜杠 + Enter → 提交命令(在普通 sendMessage 之前拦截)
$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const v = e.target.value.trim();
    if (v.startsWith('/')) {
      const name = v.split(/\s+/)[0]; e.preventDefault(); e.stopImmediatePropagation();
      $('input').value = ''; hidePop('slash-pop'); runSlash(name, v.slice(name.length).trim());
    } else if (v.startsWith('?') || v.startsWith('？')) {
      // 「? 我的需求」→ 本地秒匹配功能(零 token),匹配不到卡片上再交给 AI 选。
      const need = v.slice(1).trim();
      e.preventDefault(); e.stopImmediatePropagation();
      $('input').value = '';
      if (need) showIntentCard(need); else setStatus('用法:? 后面接你的需求,如「? 想看这次改了什么」');
    }
  }
}, true);
</script>

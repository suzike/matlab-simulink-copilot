name: Quality gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  sidecar-ui-release:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test
      - run: npm run test:ui
      - run: npm run release:check -- --artifact ../MATLAB-Copilot.mltbx --report ../_verify/quality_gate_results.json
      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence
          path: _verify/quality_gate_results.json
          if-no-files-found: error
      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            _verify/playwright-results
            _verify/playwright-report
          if-no-files-found: ignore

  matlab-compatibility:
    name: MATLAB ${{ matrix.release }} compatibility
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        release: [R2023b, R2025b]
    steps:
      - uses: actions/checkout@v6
      - name: Set up MATLAB and Simulink
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ matrix.release }}
          products: Simulink
          cache: true
      - name: Run cross-release MATLAB gates
        uses: matlab-actions/run-command@v3
        with:
          command: addpath('matlab'); results=runtests({'test/PanelUtilityTest.m','test/SetupTest.m','test/MBSEWorkflowTest.m'}); assertSuccess(results); files=dir(fullfile('matlab','+matlabcopilot','*.m')); for k=1:numel(files), assert(~isempty(meta.class.fromName("matlabcopilot."+erase(string(files(k).name),".m")))); end

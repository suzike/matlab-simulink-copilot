name: Quality gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  sidecar-ui-release:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test
      - run: npm run test:ui
      - run: npm run release:check -- --report ../_verify/quality_gate_results.json
      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            _verify/playwright-results
            _verify/playwright-report
          if-no-files-found: ignore
